spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/accommodation_tax_db
    username: postgres
    password: desw321
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  mvc:
    hiddenmethod:
      filter:
        enabled: true

server:
  port: 8080
  servlet:
    context-path: /accommodation-tax

logging:
  level:
    jp.lg.asp: INFO
