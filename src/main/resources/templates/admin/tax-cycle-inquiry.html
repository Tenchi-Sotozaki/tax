<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}" lang="ja">
<head><title>納税周期一覧</title></head>
<body>
<div layout:fragment="content" class="container-fluid p-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h2 class="h2">
                        <i class="bi bi-calendar-check me-2 text-primary"></i>納税周期一覧
                    </h2>
                    <button type="button" class="btn btn-primary btn-sm" onclick="location.href='tax-cycle-registration.html'">
                        <i class="bi bi-plus-circle me-1"></i>新規登録
                    </button>
                </div>

                <!-- 検索条件エリア -->
                <div class="card mb-4 shadow-sm">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0">
                            <i class="bi bi-funnel me-2"></i>検索条件
                        </h5>
                    </div>
                    <div class="card-body bg-light-subtle">
                        <form id="searchForm">
                            <div class="row g-3 align-items-end">
                                <div class="col-md-3">
                                    <label for="periodFrom" class="form-label fw-medium">適用時期（開始）</label>
                                    <input type="month" class="form-control" id="periodFrom" name="periodFrom">
                                </div>
                                <div class="col-md-3">
                                    <label for="periodTo" class="form-label fw-medium">適用時期（終了）</label>
                                    <input type="month" class="form-control" id="periodTo" name="periodTo">
                                </div>
                                <div class="col-md-3">
                                    <label for="cycleFilter" class="form-label fw-medium">周期</label>
                                    <select class="form-select" id="cycleFilter" name="cycleFilter">
                                        <option value="">すべて</option>
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                        <option value="4">4</option>
                                        <option value="5">5</option>
                                        <option value="6">6</option>
                                        <option value="7">7</option>
                                        <option value="8">8</option>
                                        <option value="9">9</option>
                                        <option value="10">10</option>
                                        <option value="11">11</option>
                                        <option value="12">12</option>
                                    </select>
                                </div>
                                <div class="col-md-3 d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-search me-1"></i>検索する
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" id="clearBtn">
                                        <i class="bi bi-arrow-counterclockwise me-1"></i>クリア
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 件数表示 -->
                <div class="d-flex justify-content-end align-items-center mb-2">
                    <span class="text-muted small">検索結果：<span id="resultCount">4</span> 件</span>
                </div>

                <!-- 一覧テーブル -->
                <div class="card shadow-sm mb-5">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle mb-0">
                            <thead class="table-primary">
                                <tr>
                                    <th style="width: 100px;">周期</th>
                                    <th style="width: 180px;">適用開始年月</th>
                                    <th style="width: 180px;">適用終了年月</th>
                                    <th></th>
                                    <th style="width: 110px;" class="text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="table-row-link" data-id="1" style="cursor: pointer;">
                                    <td><span class="badge bg-primary fs-6 px-3">1</span></td>
                                    <td>2026/04</td>
                                    <td>2030/03</td>
                                    <td></td>
                                    <td class="text-center">
                                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="goToEdit(1)">
                                            <i class="bi bi-pencil me-1"></i>詳細/編集
                                        </button>
                                    </td>
                                </tr>
                                <tr class="table-row-link" data-id="2" style="cursor: pointer;">
                                    <td><span class="badge bg-primary fs-6 px-3">3</span></td>
                                    <td>2024/04</td>
                                    <td>2026/03</td>
                                    <td></td>
                                    <td class="text-center">
                                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="goToEdit(2)">
                                            <i class="bi bi-pencil me-1"></i>詳細/編集
                                        </button>
                                    </td>
                                </tr>
                                <tr class="table-row-link" data-id="3" style="cursor: pointer;">
                                    <td><span class="badge bg-primary fs-6 px-3">6</span></td>
                                    <td>2022/04</td>
                                    <td>2024/03</td>
                                    <td></td>
                                    <td class="text-center">
                                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="goToEdit(3)">
                                            <i class="bi bi-pencil me-1"></i>詳細/編集
                                        </button>
                                    </td>
                                </tr>
                                <tr class="table-row-link" data-id="4" style="cursor: pointer;">
                                    <td><span class="badge bg-primary fs-6 px-3">12</span></td>
                                    <td>2030/04</td>
                                    <td class="text-muted fst-italic">未定</td>
                                    <td></td>
                                    <td class="text-center">
                                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="goToEdit(4)">
                                            <i class="bi bi-pencil me-1"></i>詳細/編集
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
</div>

<th:block layout:fragment="scripts"></th:block>
</body>
</html>
