<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}" lang="ja">
<head><title>税体系登録</title></head>
<body>
<div layout:fragment="content" class="container-fluid p-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h2 class="h2">
                        <i class="bi bi-sliders me-2 text-primary"></i>税体系登録
                    </h2>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 fs-6" id="modeLabel">
                            <i class="bi bi-plus-circle me-1"></i>新規登録
                        </span>
                    </div>
                </div>

                <!-- アラートエリア -->
                <div id="alertArea"></div>

                <form id="taxSystemForm" novalidate>
                    <div class="card mb-4 shadow-sm">
                        <div class="card-header bg-primary text-white py-3">
                            <h5 class="mb-0">
                                <i class="bi bi-gear me-2"></i>税体系情報
                            </h5>
                        </div>
                        <div class="card-body bg-light-subtle">

                            <!-- 全体エラー -->
                            <div id="errorFutureDate" class="alert alert-danger d-none" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>適用開始時期は未来の日付を入力してください
                            </div>
                            <div id="errorDuplicate" class="alert alert-danger d-none" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>既に設定された金額と重複しています
                            </div>

                            <div class="row g-3">
                                <!-- 税体系 -->
                                <div class="col-md-6">
                                    <label class="form-label fw-medium">
                                        税体系 <span class="badge bg-danger text-white ms-1">必須</span>
                                    </label>
                                    <div class="mt-1">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="taxType" id="taxTypeFixed" value="fixed" required>
                                            <label class="form-check-label" for="taxTypeFixed">定額</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="taxType" id="taxTypeRate" value="rate">
                                            <label class="form-check-label" for="taxTypeRate">定率</label>
                                        </div>
                                    </div>
                                    <div id="taxTypeError" class="text-danger small mt-1 d-none">※税体系を選択してください</div>
                                </div>

                                <!-- 区分 -->
                                <div class="col-md-6">
                                    <label class="form-label fw-medium">
                                        区分 <span class="badge bg-danger text-white ms-1">必須</span>
                                    </label>
                                    <div class="mt-1">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="taxCategory" id="categoryMunicipal" value="municipal" required>
                                            <label class="form-check-label" for="categoryMunicipal">市町村税</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="taxCategory" id="categoryPrefectural" value="prefectural">
                                            <label class="form-check-label" for="categoryPrefectural">道税</label>
                                        </div>
                                    </div>
                                    <div id="taxCategoryError" class="text-danger small mt-1 d-none">※区分を選択してください</div>
                                </div>

                                <!-- 適用時期 -->
                                <div class="col-md-4">
                                    <label for="applicablePeriod" class="form-label fw-medium">
                                        適用時期 <span class="badge bg-danger text-white ms-1">必須</span>
                                    </label>
                                    <input type="month" class="form-control" id="applicablePeriod" name="applicablePeriod" required>
                                    <div id="applicablePeriodError" class="text-danger small mt-1 d-none">※適用時期を入力してください</div>
                                </div>
                            </div>

                            <hr class="my-4">

                            <!-- 税額(税率) 行ヘッダー -->
                            <div class="row g-2 mb-2 fw-medium small text-muted">
                                <div class="col-md-2">税額(税率)</div>
                                <div class="col-md-10">条件（円以上 ～ 円未満）</div>
                            </div>

                            <!-- ① 必須 -->
                            <div class="row g-2 align-items-start mb-3">
                                <div class="col-md-2">
                                    <label for="taxAmount1" class="form-label fw-medium">
                                        税額(税率)① <span class="badge bg-danger text-white ms-1">必須</span>
                                    </label>
                                    <input type="text" class="form-control" id="taxAmount1" name="taxAmount1" required>
                                    <div id="taxAmount1Error" class="text-danger small mt-1 d-none">※税額(税率)①を入力してください</div>
                                </div>
                                <div class="col-md-10">
                                    <label class="form-label fw-medium">
                                        条件① <span class="badge bg-danger text-white ms-1">必須</span>
                                    </label>
                                    <div class="d-flex align-items-center gap-2">
                                        <input type="text" class="form-control" id="taxCond1From" name="taxCond1From" style="max-width: 140px;" required>
                                        <span class="text-nowrap">円以上 ～</span>
                                        <input type="text" class="form-control" id="taxCond1To" name="taxCond1To" style="max-width: 140px;" required>
                                        <span>円未満</span>
                                    </div>
                                    <div id="taxCond1Error" class="text-danger small mt-1 d-none">※条件①を入力してください</div>
                                </div>
                            </div>

                            <!-- ② -->
                            <div class="row g-2 align-items-start mb-3">
                                <div class="col-md-2">
                                    <label for="taxAmount2" class="form-label fw-medium">税額(税率)②</label>
                                    <input type="text" class="form-control" id="taxAmount2" name="taxAmount2">
                                </div>
                                <div class="col-md-10">
                                    <label class="form-label fw-medium">条件②</label>
                                    <div class="d-flex align-items-center gap-2">
                                        <input type="text" class="form-control" id="taxCond2From" name="taxCond2From" style="max-width: 140px;">
                                        <span class="text-nowrap">円以上 ～</span>
                                        <input type="text" class="form-control" id="taxCond2To" name="taxCond2To" style="max-width: 140px;">
                                        <span>円未満</span>
                                    </div>
                                </div>
                            </div>

                            <!-- ③ -->
                            <div class="row g-2 align-items-start mb-3">
                                <div class="col-md-2">
                                    <label for="taxAmount3" class="form-label fw-medium">税額(税率)③</label>
                                    <input type="text" class="form-control" id="taxAmount3" name="taxAmount3">
                                </div>
                                <div class="col-md-10">
                                    <label class="form-label fw-medium">条件③</label>
                                    <div class="d-flex align-items-center gap-2">
                                        <input type="text" class="form-control" id="taxCond3From" name="taxCond3From" style="max-width: 140px;">
                                        <span class="text-nowrap">円以上 ～</span>
                                        <input type="text" class="form-control" id="taxCond3To" name="taxCond3To" style="max-width: 140px;">
                                        <span>円未満</span>
                                    </div>
                                </div>
                            </div>

                            <!-- ④ -->
                            <div class="row g-2 align-items-start mb-3">
                                <div class="col-md-2">
                                    <label for="taxAmount4" class="form-label fw-medium">税額(税率)④</label>
                                    <input type="text" class="form-control" id="taxAmount4" name="taxAmount4">
                                </div>
                                <div class="col-md-10">
                                    <label class="form-label fw-medium">条件④</label>
                                    <div class="d-flex align-items-center gap-2">
                                        <input type="text" class="form-control" id="taxCond4From" name="taxCond4From" style="max-width: 140px;">
                                        <span class="text-nowrap">円以上 ～</span>
                                        <input type="text" class="form-control" id="taxCond4To" name="taxCond4To" style="max-width: 140px;">
                                        <span>円未満</span>
                                    </div>
                                </div>
                            </div>

                            <!-- ⑤ -->
                            <div class="row g-2 align-items-start mb-3">
                                <div class="col-md-2">
                                    <label for="taxAmount5" class="form-label fw-medium">税額(税率)⑤</label>
                                    <input type="text" class="form-control" id="taxAmount5" name="taxAmount5">
                                </div>
                                <div class="col-md-10">
                                    <label class="form-label fw-medium">条件⑤</label>
                                    <div class="d-flex align-items-center gap-2">
                                        <input type="text" class="form-control" id="taxCond5From" name="taxCond5From" style="max-width: 140px;">
                                        <span class="text-nowrap">円以上 ～</span>
                                        <input type="text" class="form-control" id="taxCond5To" name="taxCond5To" style="max-width: 140px;">
                                        <span>円未満</span>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- アクションボタンエリア -->
                    <div class="d-flex justify-content-center gap-3 py-4 mb-5">
                        <button type="submit" class="btn btn-primary btn-lg px-5" id="registerBtn">
                            <i class="bi bi-save me-2"></i>登録する
                        </button>
                        <button type="button" class="btn btn-success btn-lg px-5" id="updateBtn" style="display: none;">
                            <i class="bi bi-arrow-repeat me-2"></i>更新する
                        </button>
                        <button type="button" class="btn btn-danger btn-lg px-4" id="deleteBtn" style="display: none;">
                            <i class="bi bi-trash me-2"></i>削除する
                        </button>
                        <button type="button" class="btn btn-outline-secondary btn-lg px-4" onclick="history.back()">
                            <i class="bi bi-arrow-left me-2"></i>一覧に戻る
                        </button>
                    </div>
                </form>
            
    </div></main></div></div>

    <!-- 削除確認モーダル -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-exclamation-triangle me-2"></i>削除確認
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-0">この税体系情報を削除しますか？</p>
                    <p class="text-muted small mb-0">※削除した情報は復元できません。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg me-1"></i>キャンセル
                    </button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                        <i class="bi bi-trash me-1"></i>削除する
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.getElementById('taxSystemForm');
        const deleteBtn = document.getElementById('deleteBtn');

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            // エラーリセット
            document.querySelectorAll('.text-danger.small').forEach(el => el.classList.add('d-none'));
            document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
            document.getElementById('errorFutureDate').classList.add('d-none');
            document.getElementById('errorDuplicate').classList.add('d-none');

            let valid = true;

            // 税体系
            if (!document.querySelector('input[name="taxType"]:checked')) {
                document.getElementById('taxTypeError').classList.remove('d-none');
                valid = false;
            }
            // 区分
            if (!document.querySelector('input[name="taxCategory"]:checked')) {
                document.getElementById('taxCategoryError').classList.remove('d-none');
                valid = false;
            }
            // 適用時期
            const period = document.getElementById('applicablePeriod');
            if (!period.value) {
                document.getElementById('applicablePeriodError').classList.remove('d-none');
                period.classList.add('is-invalid');
                valid = false;
            }
            // 税額①
            const amount1 = document.getElementById('taxAmount1');
            if (!amount1.value.trim()) {
                document.getElementById('taxAmount1Error').classList.remove('d-none');
                amount1.classList.add('is-invalid');
                valid = false;
            }
            // 条件①
            const cond1From = document.getElementById('taxCond1From');
            const cond1To = document.getElementById('taxCond1To');
            if (!cond1From.value.trim() || !cond1To.value.trim()) {
                document.getElementById('taxCond1Error').classList.remove('d-none');
                if (!cond1From.value.trim()) cond1From.classList.add('is-invalid');
                if (!cond1To.value.trim()) cond1To.classList.add('is-invalid');
                valid = false;
            }

            if (!valid) return;

            // TODO: 登録処理
        });

        deleteBtn.addEventListener('click', function () {
            new bootstrap.Modal(document.getElementById('deleteConfirmModal')).show();
        });

        document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
            bootstrap.Modal.getInstance(document.getElementById('deleteConfirmModal')).hide();
            // TODO: 削除処理
        });
    </script>
    <script>(function(){const p=location.pathname.split('/').pop();document.querySelectorAll('.sidebar-link').forEach(l=>{if(l.getAttribute('href')===p){l.classList.remove('text-white-50');l.classList.add('text-white','fw-medium');const c=l.closest('.accordion-collapse');if(c){c.classList.add('show');c.previousElementSibling?.querySelector('.accordion-button')?.classList.remove('collapsed');}}});})();</script>
</body>
</html>
