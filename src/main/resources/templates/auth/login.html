<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - 宿泊税LGWAN-ASPシステム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/accommodation.css}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
        <div class="card-header bg-primary text-white text-center py-4">
            <i class="bi bi-building fs-2 d-block mb-2"></i>
            <h2 class="h5 mb-0 fw-bold">宿泊税LGWAN-ASPシステム</h2>
        </div>
        <div class="card-body p-4">
            <h3 class="h6 text-center text-muted mb-4">ログイン</h3>

            <!-- Spring Security ログイン失敗エラー -->
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>IDまたはパスワードが一致しません
            </div>

            <!-- Spring Security ログアウト完了メッセージ -->
            <div th:if="${param.logout}" class="alert alert-info" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>ログアウトしました
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- ID（職員番号） -->
                <div class="mb-3">
                    <label for="staffId" class="form-label fw-medium">
                        ID（職員番号）<span class="badge bg-danger ms-1">必須</span>
                    </label>
                    <input type="text" class="form-control" id="staffId" name="username"
                           autocomplete="username" required>
                </div>

                <!-- パスワード -->
                <div class="mb-4">
                    <label for="password" class="form-label fw-medium">
                        パスワード<span class="badge bg-danger ms-1">必須</span>
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                           autocomplete="current-password" required>
                </div>

                <!-- ログインボタン -->
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>ログイン
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
