<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      lang="ja">
<head>
    <title>納入金額管理台帳</title>
</head>
<body>
<div layout:fragment="content" class="container-fluid p-4">

    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h2 class="h2">
            <i class="bi bi-currency-yen me-2 text-primary"></i>納入金額管理台帳
        </h2>
    </div>

    <!-- 抽出条件エリア -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white py-3">
            <h5 class="mb-0"><i class="bi bi-funnel me-2"></i>抽出条件</h5>
        </div>
        <div class="card-body bg-light-subtle">
            <form id="searchForm">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="targetYear" class="form-label fw-medium">年度</label>
                        <input type="month" class="form-control" id="targetYear" name="targetYear" value="2024-04">
                    </div>
                    <div class="col-md-4">
                        <label for="status" class="form-label fw-medium">ステータス</label>
                        <select class="form-select" id="status" name="status">
                            <option value="">すべて</option>
                            <option value="declared">申告済み</option>
                            <option value="undeclared">未申告</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search me-1"></i>検索
                        </button>
                        <button type="button" class="btn btn-outline-secondary ms-2" onclick="clearForm()">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>クリア
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- 納税周期情報エリア -->
    <div class="alert alert-info border-info mb-4" role="alert">
        <div class="d-flex align-items-center mb-2">
            <i class="bi bi-info-circle-fill me-2"></i>
            <strong>納税周期情報</strong>
        </div>
        <div class="row g-3">
            <div class="col-md-4">
                <div class="bg-white rounded p-2 border">
                    <small class="text-muted d-block">周期区分</small>
                    <span class="fw-bold">第1期</span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="bg-white rounded p-2 border">
                    <small class="text-muted d-block">期間</small>
                    <span class="fw-bold">4月～6月</span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="bg-white rounded p-2 border">
                    <small class="text-muted d-block">納期</small>
                    <span class="fw-bold text-danger">7月末</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 操作ボタンエリア -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a th:href="@{/declaration/payment-registration}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>新規登録
        </a>
        <div class="text-muted">
            <small>検索結果: <span id="resultCount">5</span> 件</small>
        </div>
    </div>

    <!-- 一覧エリア -->
    <div class="table-container">
        <table class="table table-striped table-hover mb-0" id="paymentTable">
            <thead class="table-primary">
                <tr>
                    <th style="width: 20%;">年月</th>
                    <th style="width: 30%;" class="text-end">金額（円）</th>
                    <th style="width: 20%;" class="text-center">ステータス</th>
                    <th style="width: 30%;">備考</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <a th:href="@{/declaration/payment-registration(yearMonth='2024-04')}" class="registration-link">2024年4月</a>
                    </td>
                    <td class="text-end fw-bold">1,250,000</td>
                    <td class="text-center"><span class="badge bg-success">済</span></td>
                    <td class="text-muted small">申告期限内提出</td>
                </tr>
                <tr>
                    <td>
                        <a th:href="@{/declaration/payment-registration(yearMonth='2024-05')}" class="registration-link">2024年5月</a>
                    </td>
                    <td class="text-end fw-bold">980,500</td>
                    <td class="text-center"><span class="badge bg-success">済</span></td>
                    <td class="text-muted small">申告期限内提出</td>
                </tr>
                <tr>
                    <td>
                        <a th:href="@{/declaration/payment-registration(yearMonth='2024-06')}" class="registration-link">2024年6月</a>
                    </td>
                    <td class="text-end fw-bold">1,450,200</td>
                    <td class="text-center"><span class="badge bg-warning text-dark">未</span></td>
                    <td class="text-muted small">申告期限: 7月31日</td>
                </tr>
                <tr>
                    <td>
                        <a th:href="@{/declaration/payment-registration(yearMonth='2024-07')}" class="registration-link">2024年7月</a>
                    </td>
                    <td class="text-end fw-bold">1,680,750</td>
                    <td class="text-center"><span class="badge bg-warning text-dark">未</span></td>
                    <td class="text-muted small">申告期限: 8月31日</td>
                </tr>
                <tr>
                    <td>
                        <a th:href="@{/declaration/payment-registration(yearMonth='2024-08')}" class="registration-link">2024年8月</a>
                    </td>
                    <td class="text-end fw-bold">2,150,300</td>
                    <td class="text-center"><span class="badge bg-danger">未</span></td>
                    <td class="text-muted small">
                        <i class="bi bi-exclamation-triangle text-danger me-1"></i>期限超過
                    </td>
                </tr>
            </tbody>
            <tfoot class="table-light">
                <tr>
                    <td class="fw-bold">合計</td>
                    <td class="text-end fw-bold fs-5 text-primary">7,511,750</td>
                    <td class="text-center"><span class="badge bg-info">5件</span></td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <!-- ページネーション -->
    <nav aria-label="ページネーション" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item disabled"><a class="page-link" href="#" tabindex="-1">前へ</a></li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item"><a class="page-link" href="#">次へ</a></li>
        </ul>
    </nav>

</div>

<th:block layout:fragment="scripts">
    <script>
        function clearForm() {
            document.getElementById('searchForm').reset();
            document.getElementById('targetYear').value = '2024-04';
        }
        document.getElementById('searchForm').addEventListener('submit', function (e) {
            e.preventDefault();
        });
    </script>
</th:block>
</body>
</html>
