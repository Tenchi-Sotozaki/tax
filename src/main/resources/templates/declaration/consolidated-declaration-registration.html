<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      lang="ja">
<head><title>宿泊税合算申告情報登録</title></head>
<body>
<div layout:fragment="content" class="container-fluid p-4">

    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h2 class="h2">
            <i class="bi bi-files me-2 text-primary"></i>宿泊税合算申告情報登録
        </h2>
        <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 fs-6">
            <i class="bi bi-plus-circle me-1"></i>新規登録
        </span>
    </div>

    <form th:action="@{/consolidated/register}"
          th:object="${consolidatedDeclarationForm}" method="post">

        <!-- obligorId を hidden で保持 -->
        <input type="hidden" th:field="*{obligorId}">

        <!-- バリデーションエラーサマリー -->
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            入力内容に <span th:text="${#fields.errors().size()}"></span> 件のエラーがあります。各項目を確認してください。
        </div>

        <!-- 申告情報エリア -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-file-earmark-plus me-2"></i>申告情報</h5>
            </div>
            <div class="card-body bg-light-subtle">
                <div class="row g-3">

                    <!-- 登録日 -->
                    <div class="col-md-4">
                        <label for="registrationDate" class="form-label fw-medium">
                            登録日 <span class="badge bg-danger text-white ms-1">必須</span>
                        </label>
                        <input type="date" class="form-control" id="registrationDate"
                               th:field="*{registrationDate}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('registrationDate')}"
                             th:errors="*{registrationDate}"></div>
                    </div>

                    <!-- 特別徴収義務者（readonly） -->
                    <div class="col-md-4">
                        <label for="obligorName" class="form-label fw-medium">
                            特別徴収義務者
                        </label>
                        <input type="text" class="form-control" id="obligorName"
                               th:field="*{obligorName}" readonly>
                    </div>

                    <!-- 適用時期 -->
                    <div class="col-md-4">
                        <label for="applicablePeriod" class="form-label fw-medium">
                            適用時期 <span class="badge bg-danger text-white ms-1">必須</span>
                        </label>
                        <input type="month" class="form-control" id="applicablePeriod"
                               th:field="*{applicablePeriod}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('applicablePeriod')}"
                             th:errors="*{applicablePeriod}"></div>
                    </div>

                    <!-- 施設名一覧（動的チェックボックス） -->
                    <div class="col-md-12">
                        <label class="form-label fw-medium">
                            施設名一覧 <span class="badge bg-danger text-white ms-1">必須</span>
                        </label>
                        <div class="row g-2 mt-1">
                            <div class="col-md-6" th:each="facility : ${facilityOptions}">
                                <div class="form-check p-3 border rounded bg-white">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{facilities}"
                                           th:value="${facility.id}"
                                           th:id="${'facility_' + facility.id}">
                                    <label class="form-check-label fw-medium"
                                           th:for="${'facility_' + facility.id}">
                                        <i class="bi bi-building me-2 text-primary"></i>
                                        [[${facility.name}]]
                                    </label>
                                    <div class="small text-muted mt-1">[[${facility.address}]]</div>
                                </div>
                            </div>
                        </div>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('facilities')}"
                             th:errors="*{facilities}"></div>
                    </div>

                </div>
            </div>
        </div>

        <!-- アクションボタン -->
        <div class="d-flex justify-content-center gap-3 py-4 mb-5">
            <button type="submit" class="btn btn-primary btn-lg px-5">
                <i class="bi bi-save me-2"></i>登録する
            </button>
            <a th:href="@{/collector/list}" class="btn btn-outline-secondary btn-lg px-4">
                <i class="bi bi-arrow-left me-2"></i>一覧に戻る
            </a>
        </div>

    </form>
</div>
</body>
</html>
