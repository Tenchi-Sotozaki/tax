<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      lang="ja">
<head><title>宿泊税情報登録/編集</title></head>
<body>
<div layout:fragment="content" class="container-fluid p-4"
     th:with="obligorId=${taxDeclarationForm.obligorId}">

    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h2 class="h2">
            <i class="bi bi-pencil-square me-2 text-primary"></i>宿泊税情報登録/編集
        </h2>
        <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 fs-6">
            <i class="bi bi-plus-circle me-1"></i>新規登録
        </span>
    </div>

    <!-- 成功メッセージ -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/declaration/register}" th:object="${taxDeclarationForm}" method="post">

        <input type="hidden" th:field="*{obligorId}">

        <!-- バリデーションエラーサマリー -->
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            入力内容に <span th:text="${#fields.errors().size()}"></span> 件のエラーがあります。各項目を確認してください。
        </div>

        <!-- 基本情報 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-person-badge me-2"></i>基本情報</h5>
            </div>
            <div class="card-body bg-light-subtle">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-medium">特別徴収義務者名</label>
                        <input type="text" class="form-control" th:value="${obligorName}" readonly>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3ヶ月分申告エリア -->
        <div th:each="month, stat : *{months}" class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0">
                    <i class="bi bi-calendar-month me-2"></i>
                    <span th:text="${stat.index + 1} + 'ヶ月目'"></span>
                </h5>
            </div>
            <div class="card-body bg-light-subtle">
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-medium">申告年月</label>
                        <input type="month" class="form-control"
                               th:field="*{months[__${stat.index}__].targetYearMonth}">
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered align-middle mb-0">
                        <thead class="table-primary text-center">
                            <tr>
                                <th style="width:30%">区分</th>
                                <th style="width:20%">税率（円/泊）</th>
                                <th style="width:25%">宿泊数（泊）</th>
                                <th style="width:25%">税額（円）</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="ps-3"><span class="fw-medium">区分1</span><div class="text-muted small">20,000円未満</div></td>
                                <td class="text-end pe-3 fw-bold">200 円</td>
                                <td>
                                    <input type="number" class="form-control text-end tier-count"
                                           th:field="*{months[__${stat.index}__].guestCountTier1}"
                                           th:attr="data-rate=200, data-month=${stat.index}" min="0">
                                </td>
                                <td class="text-end pe-3 tier-tax"
                                    th:id="'taxDisplay_' + ${stat.index} + '_1'">0</td>
                                <input type="hidden"
                                       th:field="*{months[__${stat.index}__].taxAmountTier1}">
                            </tr>
                            <tr>
                                <td class="ps-3"><span class="fw-medium">区分2</span><div class="text-muted small">20,000円以上50,000円未満</div></td>
                                <td class="text-end pe-3 fw-bold">400 円</td>
                                <td>
                                    <input type="number" class="form-control text-end tier-count"
                                           th:field="*{months[__${stat.index}__].guestCountTier2}"
                                           th:attr="data-rate=400, data-month=${stat.index}" min="0">
                                </td>
                                <td class="text-end pe-3 tier-tax"
                                    th:id="'taxDisplay_' + ${stat.index} + '_2'">0</td>
                                <input type="hidden"
                                       th:field="*{months[__${stat.index}__].taxAmountTier2}">
                            </tr>
                            <tr>
                                <td class="ps-3"><span class="fw-medium">区分3</span><div class="text-muted small">50,000円以上</div></td>
                                <td class="text-end pe-3 fw-bold">1,000 円</td>
                                <td>
                                    <input type="number" class="form-control text-end tier-count"
                                           th:field="*{months[__${stat.index}__].guestCountTier3}"
                                           th:attr="data-rate=1000, data-month=${stat.index}" min="0">
                                </td>
                                <td class="text-end pe-3 tier-tax"
                                    th:id="'taxDisplay_' + ${stat.index} + '_3'">0</td>
                                <input type="hidden"
                                       th:field="*{months[__${stat.index}__].taxAmountTier3}">
                            </tr>
                            <tr class="table-light">
                                <td class="ps-3"><span class="fw-medium">課税対象外</span><div class="text-muted small">免税</div></td>
                                <td class="text-end pe-3 text-muted">-</td>
                                <td>
                                    <input type="number" class="form-control text-end exempt-count"
                                           th:field="*{months[__${stat.index}__].exemptGuestCount}"
                                           th:attr="data-month=${stat.index}" min="0">
                                </td>
                                <td class="text-end pe-3 text-muted">-</td>
                            </tr>
                        </tbody>
                        <tfoot class="table-light fw-bold">
                            <tr>
                                <td colspan="2" class="text-end pe-3">合計</td>
                                <td class="text-end pe-3"
                                    th:id="'totalCount_' + ${stat.index}">0</td>
                                <td class="text-end pe-3 text-primary"
                                    th:id="'totalTax_' + ${stat.index}">0</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <!-- ③ 更正/修正エリア -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-warning text-dark py-3">
                <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>更正/修正</h5>
            </div>
            <div class="card-body bg-light-subtle">
                <div class="row g-3">
                    <div class="col-md-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="isCorrection"
                                   th:field="*{isCorrection}">
                            <label class="form-check-label fw-medium" for="isCorrection">
                                更正/修正を行う
                            </label>
                        </div>
                    </div>
                    <div class="col-md-12" id="correctionReasonArea" style="display: none;">
                        <label for="correctionReason" class="form-label fw-medium">
                            更正理由 <span class="badge bg-danger text-white ms-1">必須</span>
                        </label>
                        <textarea class="form-control" id="correctionReason" rows="3"
                                  th:field="*{correctionReason}"
                                  placeholder="更正または修正の理由を入力してください"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- アクションボタン -->
        <div class="d-flex justify-content-center gap-3 py-4 mb-5">
            <button type="submit" class="btn btn-primary btn-lg px-5">
                <i class="bi bi-save me-2"></i>登録する
            </button>
            <button type="button" id="btnPreview" class="btn btn-outline-info btn-lg px-4">
                <i class="bi bi-eye me-2"></i>プレビュー
            </button>
            <button type="button" id="btnPrint" class="btn btn-outline-secondary btn-lg px-4">
                <i class="bi bi-printer me-2"></i>印刷
            </button>
            <button type="button" class="btn btn-outline-secondary btn-lg px-4" onclick="history.back()">
                <i class="bi bi-arrow-left me-2"></i>戻る
            </button>
        </div>

    </form>

    <!-- 印刷用非表示iframe -->
    <iframe id="printFrame" style="display:none;"></iframe>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/t_tax_declaration_registration.js}"></script>
</th:block>
</body>
</html>
