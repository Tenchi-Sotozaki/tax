<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      lang="ja">
<head>
    <title>宿泊税情報登録/編集</title>
</head>

<body>
<div layout:fragment="content">

    <!-- ページヘッダー -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-1">
                <i class="bi bi-pencil-square me-2 text-primary"></i>宿泊税情報登録/編集
            </h4>
            <p class="text-muted small mb-0">宿泊税の申告情報を入力してください。<span class="text-danger">※</span> は必須項目です。</p>
        </div>
        <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 fs-6" id="modeLabel">
            <i class="bi bi-plus-circle me-1"></i>新規登録
        </span>
    </div>

    <!-- アラートエリア -->
    <div id="alertArea"></div>

    <form id="declarationForm" novalidate>

        <!-- 基本情報 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header d-flex align-items-center gap-2 bg-primary text-white py-3">
                <i class="bi bi-info-circle-fill"></i>
                <span class="fw-semibold">基本情報</span>
            </div>
            <div class="card-body bg-light-subtle">
                <div class="row g-3">

                    <div class="col-md-4">
                        <label for="collectorId" class="form-label required-label fw-medium">特別徴収義務者ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-person-badge text-secondary"></i></span>
                            <input type="text" class="form-control" id="collectorId" name="collectorId"
                                   maxlength="20" placeholder="例：C0001" required>
                        </div>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="col-md-4">
                        <label for="facilityId" class="form-label required-label fw-medium">宿泊施設ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-building text-secondary"></i></span>
                            <input type="text" class="form-control" id="facilityId" name="facilityId"
                                   maxlength="20" placeholder="例：F0001" required>
                        </div>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="col-md-4">
                        <label for="paymentYearMonth" class="form-label required-label fw-medium">納入年月</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-calendar3 text-secondary"></i></span>
                            <input type="text" class="form-control" id="paymentYearMonth" name="paymentYearMonth"
                                   maxlength="6" placeholder="例：202504" required pattern="\d{6}">
                            <span class="input-group-text bg-white text-muted small">YYYYMM</span>
                        </div>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="col-md-4">
                        <label for="totalNights" class="form-label required-label fw-medium">総宿泊数</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-moon-stars text-secondary"></i></span>
                            <input type="number" class="form-control" id="totalNights" name="totalNights"
                                   min="0" required>
                            <span class="input-group-text bg-white">泊</span>
                        </div>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="col-md-4">
                        <label for="exemptNights" class="form-label required-label fw-medium">課税対象外宿泊数</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-slash-circle text-secondary"></i></span>
                            <input type="number" class="form-control" id="exemptNights" name="exemptNights"
                                   min="0" required>
                            <span class="input-group-text bg-white">泊</span>
                        </div>
                        <div class="invalid-feedback"></div>
                    </div>

                </div>
            </div>
        </div>

        <!-- 税区分明細 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header d-flex align-items-center gap-2 bg-primary text-white py-3">
                <i class="bi bi-table"></i>
                <span class="fw-semibold">税区分別宿泊数</span>
            </div>
            <div class="card-body p-0">
                <table class="table table-bordered table-hover align-middle mb-0" id="detailTable">
                    <thead class="table-primary text-center">
                        <tr>
                            <th class="py-3" style="width:35%">税区分</th>
                            <th class="py-3" style="width:20%">設定税額（円/泊）</th>
                            <th class="py-3" style="width:25%">課税対象宿泊数（泊）</th>
                            <th class="py-3" style="width:20%">小計（円）</th>
                        </tr>
                    </thead>
                    <tbody id="detailTableBody">
                        <!-- JavaScriptで動的生成 -->
                    </tbody>
                    <tfoot class="table-light">
                        <tr>
                            <td colspan="3" class="text-end pe-4 fw-bold py-3">
                                <i class="bi bi-calculator me-1 text-primary"></i>納入合計金額
                            </td>
                            <td class="text-end pe-4 py-3" id="totalPaymentAmount">0 円</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- ボタン -->
        <div class="d-flex justify-content-end gap-2 pb-3">
            <button type="button" class="btn btn-outline-secondary px-4" id="clearBtn">
                <i class="bi bi-arrow-counterclockwise me-1"></i>クリア
            </button>
            <button type="submit" class="btn btn-primary px-4" id="submitBtn">
                <i class="bi bi-save me-1"></i>登録
            </button>
        </div>

    </form>

    <!-- 確認モーダル -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="bi bi-check2-square me-2"></i>登録確認</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-3">以下の内容で登録します。よろしいですか？</p>
                    <dl class="row small bg-light rounded p-3 mb-0" id="confirmContent"></dl>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg me-1"></i>キャンセル
                    </button>
                    <button type="button" class="btn btn-primary" id="confirmSubmitBtn">
                        <i class="bi bi-check-lg me-1"></i>確定
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/declaration-form.js}"></script>
</th:block>
</body>
</html>
