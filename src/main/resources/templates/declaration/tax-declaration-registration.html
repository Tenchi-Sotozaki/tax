<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      lang="ja">
<head><title>宿泊税情報登録/編集</title></head>
<body>
<div layout:fragment="content" class="container-fluid p-4"
     th:with="obligorId=${taxDeclarationForm.obligorId}">

    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h2 class="h2">
            <i class="bi bi-pencil-square me-2 text-primary"></i>宿泊税情報登録/編集
        </h2>
        <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 fs-6">
            <i class="bi bi-plus-circle me-1"></i>新規登録
        </span>
    </div>

    <!-- 成功メッセージ -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/declaration/register}" th:object="${taxDeclarationForm}" method="post">

        <input type="hidden" th:field="*{obligorId}">

        <!-- バリデーションエラーサマリー -->
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            入力内容に <span th:text="${#fields.errors().size()}"></span> 件のエラーがあります。各項目を確認してください。
        </div>

        <!-- ① 基本情報エリア -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-person-badge me-2"></i>基本情報</h5>
            </div>
            <div class="card-body bg-light-subtle">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-medium">特別徴収義務者名</label>
                        <input type="text" class="form-control" th:value="${obligorName}" readonly>
                    </div>
                </div>
            </div>
        </div>

        <!-- ② 申告情報エリア -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-file-earmark-text me-2"></i>申告情報</h5>
            </div>
            <div class="card-body bg-light-subtle">
                <div class="row g-3">

                    <!-- 申告年月 -->
                    <div class="col-md-4">
                        <label for="targetYearMonth" class="form-label fw-medium">
                            申告年月 <span class="badge bg-danger text-white ms-1">必須</span>
                        </label>
                        <input type="month" class="form-control" id="targetYearMonth"
                               th:field="*{targetYearMonth}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('targetYearMonth')}"
                             th:errors="*{targetYearMonth}"></div>
                    </div>

                    <!-- 課税対象宿泊数 -->
                    <div class="col-md-4">
                        <label for="taxableGuestCount" class="form-label fw-medium">
                            課税対象宿泊数 <span class="badge bg-danger text-white ms-1">必須</span>
                        </label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="taxableGuestCount"
                                   th:field="*{taxableGuestCount}" th:errorclass="is-invalid" min="0">
                            <span class="input-group-text">泊</span>
                        </div>
                        <div class="invalid-feedback d-block"
                             th:if="${#fields.hasErrors('taxableGuestCount')}"
                             th:errors="*{taxableGuestCount}"></div>
                    </div>

                    <!-- 月計表入力ボタン（IDを monthlyTaxModal に統一） -->
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="button" class="btn btn-outline-primary w-100"
                                data-bs-toggle="modal" data-bs-target="#monthlyTaxModal">
                            <i class="bi bi-table me-1"></i>月計表から入力する
                        </button>
                    </div>

                    <!-- 設定税額 -->
                    <div class="col-md-4">
                        <label for="taxRate" class="form-label fw-medium">
                            設定税額（円/泊） <span class="badge bg-danger text-white ms-1">必須</span>
                        </label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="taxRate"
                                   th:field="*{taxRate}" th:errorclass="is-invalid" min="0">
                            <span class="input-group-text">円/泊</span>
                        </div>
                        <div class="invalid-feedback d-block"
                             th:if="${#fields.hasErrors('taxRate')}"
                             th:errors="*{taxRate}"></div>
                    </div>

                    <!-- 納入金額（自動計算・readonly） -->
                    <div class="col-md-4">
                        <label for="totalTaxAmount" class="form-label fw-medium">納入金額</label>
                        <div class="input-group">
                            <input type="number" class="form-control bg-light fw-bold text-primary"
                                   id="totalTaxAmount" th:field="*{totalTaxAmount}" readonly>
                            <span class="input-group-text">円</span>
                        </div>
                        <div class="form-text text-muted">課税対象宿泊数 × 設定税額で自動計算されます</div>
                    </div>

                </div>
            </div>
        </div>

        <!-- ③ 更正/修正エリア -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-warning text-dark py-3">
                <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>更正/修正</h5>
            </div>
            <div class="card-body bg-light-subtle">
                <div class="row g-3">

                    <div class="col-md-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="isCorrection"
                                   th:field="*{isCorrection}">
                            <label class="form-check-label fw-medium" for="isCorrection">
                                更正/修正を行う
                            </label>
                        </div>
                    </div>

                    <div class="col-md-12" id="correctionReasonArea" style="display: none;">
                        <label for="correctionReason" class="form-label fw-medium">
                            更正理由 <span class="badge bg-danger text-white ms-1">必須</span>
                        </label>
                        <textarea class="form-control" id="correctionReason" rows="3"
                                  th:field="*{correctionReason}"
                                  placeholder="更正または修正の理由を入力してください"></textarea>
                    </div>

                </div>
            </div>
        </div>

        <!-- アクションボタン -->
        <div class="d-flex justify-content-center gap-3 py-4 mb-5">
            <button type="submit" class="btn btn-primary btn-lg px-5">
                <i class="bi bi-save me-2"></i>登録する
            </button>
            <a th:href="@{/declaration/pdf/{id}(id=${taxDeclarationForm.obligorId})}"
               class="btn btn-outline-secondary btn-lg px-4"
               target="_blank">
                <i class="bi bi-file-earmark-pdf me-2"></i>申告書PDF出力
            </a>
            <button type="button" class="btn btn-outline-secondary btn-lg px-4" onclick="history.back()">
                <i class="bi bi-arrow-left me-2"></i>戻る
            </button>
        </div>

    </form>

    <!-- ===== 月計表登録モーダル ===== -->
    <div class="modal fade" id="monthlyTaxModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-table me-2"></i>月計表登録
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-3">日ごとの宿泊数を入力してください。合計は自動計算されます。</p>
                    <div class="table-responsive" style="max-height: 420px; overflow-y: auto;">
                        <table class="table table-bordered table-sm align-middle mb-0">
                            <thead class="table-primary text-center sticky-top">
                                <tr>
                                    <th style="width: 80px;">日付</th>
                                    <th>宿泊数（泊）</th>
                                </tr>
                            </thead>
                            <tbody id="monthlyTableBody"></tbody>
                            <tfoot class="table-light">
                                <tr>
                                    <td class="fw-bold text-center">合計</td>
                                    <td>
                                        <input type="number" class="form-control form-control-sm fw-bold text-primary"
                                               id="monthlyTotal" readonly value="0">
                                    </td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg me-1"></i>キャンセル
                    </button>
                    <button type="button" class="btn btn-primary" id="btnConfirmMonthly">
                        <i class="bi bi-check-lg me-1"></i>確定して反映する
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="scripts">
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // ===== 月計表: 1日〜31日の行を動的生成 =====
            const tbody = document.getElementById('monthlyTableBody');
            for (let day = 1; day <= 31; day++) {
                const tr = document.createElement('tr');
                tr.innerHTML =
                    '<td class="text-center fw-medium">' + day + '日</td>' +
                    '<td><input type="number" class="form-control form-control-sm daily-count" min="0" value="0"></td>';
                tbody.appendChild(tr);
            }

            // ===== 月計表: 合計の自動計算 =====
            function calcMonthlyTotal() {
                let total = 0;
                document.querySelectorAll('.daily-count').forEach(function (input) {
                    const v = parseInt(input.value);
                    total += (isNaN(v) || v < 0) ? 0 : v;
                });
                document.getElementById('monthlyTotal').value = total;
            }

            tbody.addEventListener('input', function (e) {
                if (e.target.classList.contains('daily-count')) {
                    if (parseInt(e.target.value) < 0) e.target.value = 0;
                    calcMonthlyTotal();
                }
            });

            // ===== 月計表: 「確定して反映する」ボタン =====
            document.getElementById('btnConfirmMonthly').addEventListener('click', function () {
                const total = parseInt(document.getElementById('monthlyTotal').value) || 0;
                const guestInput = document.getElementById('taxableGuestCount');
                guestInput.value = total;
                guestInput.dispatchEvent(new Event('input'));
                bootstrap.Modal.getInstance(document.getElementById('monthlyTaxModal')).hide();
            });

            // ===== 月計表: モーダルを開くたびにリセット =====
            document.getElementById('monthlyTaxModal').addEventListener('show.bs.modal', function () {
                document.querySelectorAll('.daily-count').forEach(function (input) { input.value = 0; });
                document.getElementById('monthlyTotal').value = 0;
            });

            // ===== 自動計算: 宿泊数 × 税額 → 納入金額 =====
            function calcTotal() {
                const guestCount = parseInt(document.getElementById('taxableGuestCount').value) || 0;
                const taxRate    = parseInt(document.getElementById('taxRate').value)           || 0;
                document.getElementById('totalTaxAmount').value = guestCount * taxRate;
            }

            document.getElementById('taxableGuestCount').addEventListener('input', calcTotal);
            document.getElementById('taxRate').addEventListener('input', calcTotal);

            // ===== 更正理由エリアの表示切替 =====
            function toggleCorrectionArea() {
                const checked = document.getElementById('isCorrection').checked;
                document.getElementById('correctionReasonArea').style.display = checked ? 'block' : 'none';
            }

            document.getElementById('isCorrection').addEventListener('change', toggleCorrectionArea);

            // 初期ロード時に実行
            toggleCorrectionArea();
            calcTotal();
        });
    </script>
</th:block>
</body>
</html>
