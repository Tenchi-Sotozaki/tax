<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      lang="ja">
<head><title>宿泊税情報登録/編集</title></head>
<body>
<div layout:fragment="content" class="container-fluid p-4"
     th:with="obligorId=${taxDeclarationForm.obligorId}">

    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h2 class="h2">
            <i class="bi bi-pencil-square me-2 text-primary"></i>宿泊税情報登録/編集
        </h2>
        <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 fs-6">
            <i class="bi bi-plus-circle me-1"></i>新規登録
        </span>
    </div>

    <!-- 成功メッセージ -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/declaration/register}" th:object="${taxDeclarationForm}" method="post">

        <input type="hidden" th:field="*{obligorId}">
        <!-- 合計値（JS で計算してセット） -->
        <input type="hidden" id="totalGuestCount" th:field="*{totalGuestCount}">
        <input type="hidden" id="totalTaxAmount"  th:field="*{totalTaxAmount}">

        <!-- バリデーションエラーサマリー -->
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            入力内容に <span th:text="${#fields.errors().size()}"></span> 件のエラーがあります。各項目を確認してください。
        </div>

        <!-- ① 基本情報エリア -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-person-badge me-2"></i>基本情報</h5>
            </div>
            <div class="card-body bg-light-subtle">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-medium">特別徴収義務者名</label>
                        <input type="text" class="form-control" th:value="${obligorName}" readonly>
                    </div>
                    <div class="col-md-4">
                        <label for="targetYearMonth" class="form-label fw-medium">
                            申告年月 <span class="badge bg-danger text-white ms-1">必須</span>
                        </label>
                        <input type="month" class="form-control" id="targetYearMonth"
                               th:field="*{targetYearMonth}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('targetYearMonth')}"
                             th:errors="*{targetYearMonth}"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ② 申告情報エリア（3段階税率テーブル） -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-file-earmark-text me-2"></i>申告情報（3段階税率）</h5>
            </div>
            <div class="card-body bg-light-subtle p-0">
                <div class="table-responsive">
                    <table class="table table-bordered align-middle mb-0">
                        <thead class="table-primary text-center">
                            <tr>
                                <th style="width: 30%;">区分</th>
                                <th style="width: 20%;">税率（円/泊）</th>
                                <th style="width: 20%;">宿泊数（泊）</th>
                                <th style="width: 20%;">税額（円）</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 区分1 -->
                            <tr>
                                <td class="ps-3">
                                    <span class="fw-medium">区分1</span>
                                    <div class="text-muted small">1人1泊 2万円未満</div>
                                </td>
                                <td class="text-end pe-3 fw-bold">100 円</td>
                                <td>
                                    <input type="number" class="form-control text-end tier-count"
                                           id="guestCountTier1" th:field="*{guestCountTier1}"
                                           min="0" data-rate="100">
                                </td>
                                <td>
                                    <input type="number" class="form-control text-end bg-light tier-tax"
                                           id="taxAmountTier1" th:field="*{taxAmountTier1}"
                                           readonly>
                                </td>
                            </tr>
                            <!-- 区分2 -->
                            <tr>
                                <td class="ps-3">
                                    <span class="fw-medium">区分2</span>
                                    <div class="text-muted small">1人1泊 2万円以上5万円未満</div>
                                </td>
                                <td class="text-end pe-3 fw-bold">200 円</td>
                                <td>
                                    <input type="number" class="form-control text-end tier-count"
                                           id="guestCountTier2" th:field="*{guestCountTier2}"
                                           min="0" data-rate="200">
                                </td>
                                <td>
                                    <input type="number" class="form-control text-end bg-light tier-tax"
                                           id="taxAmountTier2" th:field="*{taxAmountTier2}"
                                           readonly>
                                </td>
                            </tr>
                            <!-- 区分3 -->
                            <tr>
                                <td class="ps-3">
                                    <span class="fw-medium">区分3</span>
                                    <div class="text-muted small">1人1泊 5万円以上</div>
                                </td>
                                <td class="text-end pe-3 fw-bold">500 円</td>
                                <td>
                                    <input type="number" class="form-control text-end tier-count"
                                           id="guestCountTier3" th:field="*{guestCountTier3}"
                                           min="0" data-rate="500">
                                </td>
                                <td>
                                    <input type="number" class="form-control text-end bg-light tier-tax"
                                           id="taxAmountTier3" th:field="*{taxAmountTier3}"
                                           readonly>
                                </td>
                            </tr>
                        </tbody>
                        <tfoot class="table-light fw-bold">
                            <tr>
                                <td colspan="2" class="text-end pe-3">合計</td>
                                <td>
                                    <input type="number" class="form-control text-end bg-light fw-bold"
                                           id="displayTotalCount" readonly value="0">
                                </td>
                                <td>
                                    <input type="number" class="form-control text-end bg-light fw-bold text-primary"
                                           id="displayTotalTax" readonly value="0">
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                <div class="p-3 text-muted small">
                    <i class="bi bi-info-circle me-1"></i>
                    宿泊数を入力すると税額・合計が自動計算されます。
                </div>
            </div>
        </div>

        <!-- ③ 更正/修正エリア -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-warning text-dark py-3">
                <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>更正/修正</h5>
            </div>
            <div class="card-body bg-light-subtle">
                <div class="row g-3">
                    <div class="col-md-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="isCorrection"
                                   th:field="*{isCorrection}">
                            <label class="form-check-label fw-medium" for="isCorrection">
                                更正/修正を行う
                            </label>
                        </div>
                    </div>
                    <div class="col-md-12" id="correctionReasonArea" style="display: none;">
                        <label for="correctionReason" class="form-label fw-medium">
                            更正理由 <span class="badge bg-danger text-white ms-1">必須</span>
                        </label>
                        <textarea class="form-control" id="correctionReason" rows="3"
                                  th:field="*{correctionReason}"
                                  placeholder="更正または修正の理由を入力してください"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- アクションボタン -->
        <div class="d-flex justify-content-center gap-3 py-4 mb-5">
            <button type="submit" class="btn btn-primary btn-lg px-5">
                <i class="bi bi-save me-2"></i>登録する
            </button>
            <a th:href="@{/declaration/pdf/{id}(id=${taxDeclarationForm.obligorId})}"
               class="btn btn-outline-secondary btn-lg px-4" target="_blank">
                <i class="bi bi-file-earmark-pdf me-2"></i>申告書PDF出力
            </a>
            <button type="button" class="btn btn-outline-secondary btn-lg px-4" onclick="history.back()">
                <i class="bi bi-arrow-left me-2"></i>戻る
            </button>
        </div>

    </form>
</div>

<th:block layout:fragment="scripts">
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // ===== 3段階税率: 自動計算 =====
            function calcTierTax(countInput) {
                const count = parseInt(countInput.value) || 0;
                const rate  = parseInt(countInput.dataset.rate) || 0;
                // 対応する税額フィールドを更新（同じ行の .tier-tax）
                const row   = countInput.closest('tr');
                const taxInput = row.querySelector('.tier-tax');
                taxInput.value = count * rate;
                calcTotals();
            }

            function calcTotals() {
                let totalCount = 0;
                let totalTax   = 0;
                document.querySelectorAll('.tier-count').forEach(function (input) {
                    const count = parseInt(input.value) || 0;
                    const rate  = parseInt(input.dataset.rate) || 0;
                    totalCount += count;
                    totalTax   += count * rate;
                });
                document.getElementById('displayTotalCount').value = totalCount;
                document.getElementById('displayTotalTax').value   = totalTax;
                // hidden フィールドにも反映（POST で送信される）
                document.getElementById('totalGuestCount').value = totalCount;
                document.getElementById('totalTaxAmount').value  = totalTax;
            }

            document.querySelectorAll('.tier-count').forEach(function (input) {
                input.addEventListener('input', function () {
                    if (parseInt(this.value) < 0) this.value = 0;
                    calcTierTax(this);
                });
            });

            // ===== 更正理由エリアの表示切替 =====
            function toggleCorrectionArea() {
                const checked = document.getElementById('isCorrection').checked;
                document.getElementById('correctionReasonArea').style.display =
                    checked ? 'block' : 'none';
            }

            document.getElementById('isCorrection').addEventListener('change', toggleCorrectionArea);

            // 初期ロード時に実行
            toggleCorrectionArea();
            // 既存値がある場合に合計を再計算
            document.querySelectorAll('.tier-count').forEach(calcTierTax);
        });
    </script>
</th:block>
</body>
</html>
