<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      lang="ja">
<head><title>納入金額管理台帳</title></head>
<body>
<div layout:fragment="content" class="container-fluid p-4">

    <!-- ① 画面タイトル -->
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h2 class="h2">
            <i class="bi bi-currency-yen me-2 text-primary"></i>納入金額管理台帳
        </h2>
        <!-- ② 新規登録ボタン -->
        <a th:href="@{/declaration/register/{id}(id=${obligorId})}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>新規登録
        </a>
    </div>

    <!-- ③ 抽出条件エリア -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white py-3">
            <h5 class="mb-0"><i class="bi bi-funnel me-2"></i>抽出条件</h5>
        </div>
        <div class="card-body bg-light-subtle">
            <form th:action="@{/payment-ledger/{id}(id=${obligorId})}"
                  th:object="${searchForm}" method="get">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label for="targetYear" class="form-label fw-medium">年度</label>
                        <input type="month" class="form-control" id="targetYear"
                               th:field="*{targetYear}">
                    </div>
                    <div class="col-md-3">
                        <label for="status" class="form-label fw-medium">ステータス</label>
                        <select class="form-select" id="status" th:field="*{status}">
                            <option value="">すべて</option>
                            <option value="済">申告済み</option>
                            <option value="未">未申告</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search me-1"></i>検索
                        </button>
                        <a th:href="@{/payment-ledger/{id}(id=${obligorId})}"
                           class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>クリア
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- ④ 納税周期情報エリア -->
    <div class="alert alert-info border-info mb-4" role="alert">
        <div class="d-flex align-items-center mb-2">
            <i class="bi bi-info-circle-fill me-2 fs-5"></i>
            <strong>納税周期情報</strong>
        </div>
        <div class="row g-3">
            <div class="col-md-4">
                <div class="bg-white rounded p-2 border">
                    <small class="text-muted d-block">周期区分</small>
                    <span class="fw-bold" th:text="${taxCycleInfo.cycleCategory}"></span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="bg-white rounded p-2 border">
                    <small class="text-muted d-block">期間</small>
                    <span class="fw-bold" th:text="${taxCycleInfo.period}"></span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="bg-white rounded p-2 border">
                    <small class="text-muted d-block">納期</small>
                    <span class="fw-bold text-danger" th:text="${taxCycleInfo.deadline}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 件数表示 -->
    <div class="d-flex justify-content-end mb-2">
        <span class="text-muted small">
            検索結果: <span th:text="${#lists.size(records)}">0</span> 件
        </span>
    </div>

    <!-- ⑤ 一覧テーブル / ⑥ 空メッセージ -->
    <div th:if="${#lists.isEmpty(records)}"
         class="alert alert-warning text-center py-4" role="alert">
        <i class="bi bi-exclamation-triangle fs-4 d-block mb-2"></i>
        表示できる情報がありません
    </div>

    <div th:unless="${#lists.isEmpty(records)}" class="card shadow-sm mb-5">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-primary">
                    <tr>
                        <th style="width: 180px;">年月</th>
                        <th style="width: 200px;" class="text-end">金額（円）</th>
                        <th style="width: 120px;" class="text-center">ステータス</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="record : ${records}">
                        <!-- 年月（編集画面へのリンク） -->
                        <td>
                            <a th:href="@{/declaration/payment-registration/{id}(id=${record.id})}"
                               class="registration-link fw-medium"
                               th:text="${#temporals.format(record.targetYearMonth, 'yyyy年M月')}">
                            </a>
                        </td>
                        <!-- 金額（カンマ区切り） -->
                        <td class="text-end fw-bold"
                            th:text="${#numbers.formatInteger(record.amount, 3, 'COMMA')}">
                        </td>
                        <!-- ステータスバッジ -->
                        <td class="text-center">
                            <span th:if="${record.status == '済'}"
                                  class="badge bg-primary">済</span>
                            <span th:unless="${record.status == '済'}"
                                  class="badge bg-danger">未</span>
                        </td>
                        <td></td>
                    </tr>
                    <!-- 合計行 -->
                    <tr class="table-light fw-bold">
                        <td>合計</td>
                        <td class="text-end text-primary fs-5"
                            th:text="${#numbers.formatInteger(totalAmount, 3, 'COMMA')}">
                        </td>
                        <td class="text-center">
                            <span class="badge bg-info"
                                  th:text="${#lists.size(records)} + '件'"></span>
                        </td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
