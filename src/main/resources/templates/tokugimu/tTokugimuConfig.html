<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}" lang="ja">
<head>
<title>特別徴収義務者新規登録/編集/照会</title>
</head>
<body>
	<div layout:fragment="content" class="container-fluid p-4"
		th:with="formAction=${isEdit} ? '/tokugimu/edit/' + ${editId} : '/tokugimu/registration'">

		<div
			class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
			<h2 class="h2">
				<i class="bi bi-person-plus me-2 text-primary"></i> <span
					th:text="${isView} ? '特別徴収義務者 照会' : (${isEdit} ? '特別徴収義務者 編集' : '特別徴収義務者 新規登録')"></span>
			</h2>
		</div>

		<!-- 登録・更新成功メッセージ -->
		<div th:if="${successMessage}"
			class="alert alert-success alert-dismissible fade show" role="alert">
			<i class="bi bi-check-circle-fill me-2"></i> <span
				th:text="${successMessage}"></span>
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>

		<form id="registerForm" th:action="@{${formAction}}"
			th:object="${TokugimuForm}" method="post">

			<!-- 編集時のID保持 -->
			<input th:if="${isEdit}" type="hidden" th:field="*{id}">
			<!-- 宛名番号保持 -->
			<input type="hidden" th:field="*{atenaNo}" id="atenaNo">

			<!-- バリデーションエラーサマリー -->
			<div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger"
				role="alert">
				<i class="bi bi-exclamation-triangle-fill me-2"></i> 入力内容に <span
					th:text="${#fields.errors().size()}"></span>
				件のエラーがあります。各項目を確認してください。
			</div>

			<!-- ===== 特別徴収義務者情報 ===== -->
			<div class="card mb-4 shadow-sm">
				<div class="card-header bg-primary text-white py-3">
					<h5 class="mb-0">
						<i class="bi bi-person-badge me-2"></i>特別徴収義務者情報
					</h5>
				</div>
				<div class="card-body bg-light-subtle">
					<div class="row g-3">

						<div class="col-md-4">
							<label for="registrationDate" class="form-label fw-medium">
								登録日 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label>
							<input th:if="!${isView}" type="date" class="form-control" id="registrationDate"
								th:field="*{registrationDate}" th:errorclass="is-invalid">
							<input th:if="${isView}" type="text" class="form-control" readonly
								th:value="*{registrationDate}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('registrationDate')}"
								th:errors="*{registrationDate}"></div>
						</div>

						<div class="col-md-4 d-flex align-items-end" th:if="!${isView}">
							<button type="button" class="btn btn-outline-primary"
								data-bs-toggle="modal" data-bs-target="#addressSearchModal">
								<i class="bi bi-search me-1"></i>宛名検索
							</button>
						</div>
						<div class="col-md-4"></div>

						<div class="col-md-6">
							<label for="tokugimuAddress" class="form-label fw-medium">
								住所 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="tokugimuAddress"
								th:field="*{tokugimuAddress}" th:errorclass="is-invalid"
								placeholder="自動入力されます" readonly>
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('tokugimuAddress')}"
								th:errors="*{tokugimuAddress}"></div>
						</div>

						<div class="col-md-6">
							<label for="name" class="form-label fw-medium"> 氏名 <span
								th:if="!${isView}" class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="name"
								th:field="*{name}" th:errorclass="is-invalid"
								placeholder="自動入力されます" readonly>
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
						</div>

						<div class="col-md-6">
							<label for="personalNumber" class="form-label fw-medium">個人番号</label>
							<input type="text" class="form-control" id="personalNumber"
								th:field="*{personalNumber}" placeholder="自動入力されます" readonly>
						</div>

						<div class="col-md-6">
							<label for="corporateNumber" class="form-label fw-medium">法人番号</label>
							<input type="text" class="form-control" id="corporateNumber"
								th:field="*{corporateNumber}" placeholder="自動入力されます" readonly>
						</div>

						<div class="col-md-6">
							<label for="tokugimuPhone" class="form-label fw-medium">
								電話番号 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="tel" class="form-control" id="tokugimuPhone"
								th:field="*{tokugimuPhone}" th:errorclass="is-invalid"
								placeholder="自動入力されます" readonly>
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('tokugimuPhone')}"
								th:errors="*{tokugimuPhone}"></div>
						</div>

					</div>
				</div>
			</div>

			<!-- ===== 宿泊施設情報 ===== -->
			<div class="card mb-4 shadow-sm">
				<div class="card-header bg-primary text-white py-3">
					<h5 class="mb-0">
						<i class="bi bi-building me-2"></i>宿泊施設情報
					</h5>
				</div>
				<div class="card-body bg-light-subtle">
					<div class="row g-3">

						<div class="col-md-4">
							<label for="facilityAddressNo" class="form-label fw-medium">
								所在地(郵便番号) <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="facilityAddressNo"
								th:field="*{facilityAddressNo}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('facilityAddressNo')}"
								th:errors="*{facilityAddressNo}"></div>
						</div>

						<div class="col-md-8">
							<label for="facilityAddress" class="form-label fw-medium">
								所在地(住所) <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="facilityAddress"
								th:field="*{facilityAddress}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('facilityAddress')}"
								th:errors="*{facilityAddress}"></div>
						</div>

						<div class="col-md-6">
							<label for="facilityName" class="form-label fw-medium">
								施設名称 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="facilityName"
								th:field="*{facilityName}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('facilityName')}"
								th:errors="*{facilityName}"></div>
						</div>

						<div class="col-md-6">
							<label for="facilityNameKana" class="form-label fw-medium">
								施設名称(ふりがな) <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="facilityNameKana"
								th:field="*{facilityNameKana}" th:errorclass="is-invalid"
								placeholder="ひらがなで入力" th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('facilityNameKana')}"
								th:errors="*{facilityNameKana}"></div>
						</div>

						<div class="col-md-6">
							<label for="facilityPhone" class="form-label fw-medium">
								電話番号 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="tel" class="form-control" id="facilityPhone"
								th:field="*{facilityPhone}" th:errorclass="is-invalid"
								placeholder="例）03-1234-5678" th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('facilityPhone')}"
								th:errors="*{facilityPhone}"></div>
						</div>

						<div class="col-md-4">
							<label for="floorArea" class="form-label fw-medium"> 延床面積
								<span th:if="!${isView}" class="badge bg-danger text-white ms-1">必須</span>
							</label>
							<div class="input-group">
								<input type="number" class="form-control" id="floorArea"
									th:readonly="${isView}" th:field="*{floorArea}"
									th:errorclass="is-invalid" step="0.01"> <span
									class="input-group-text">㎡</span>
							</div>
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('floorArea')}"
								th:errors="*{floorArea}"></div>
						</div>

						<div class="col-md-4">
							<label for="aboveGroundFloor" class="form-label fw-medium">
								階層（地上）<span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="floors"
								th:field="*{aboveGroundFloor}" th:errorclass="is-invalid"
								placeholder="施設の地上階数を入力する" th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('aboveGroundFloor')}"
								th:errors="*{aboveGroundFloor}"></div>
						</div>

						<div class="col-md-4">
							<label for="basementFloor" class="form-label fw-medium">
								階層（地下）<span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="basementFloor"
								th:field="*{basementFloor}" th:errorclass="is-invalid"
								placeholder="施設の地下階数を入力する" th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('basementFloor')}"
								th:errors="*{basementFloor}"></div>
						</div>

						<div class="col-md-4">
							<label for="roomCount" class="form-label fw-medium"> 客室数
								<span th:if="!${isView}" class="badge bg-danger text-white ms-1">必須</span>
							</label>
							<div class="input-group">
								<input type="number" class="form-control" id="roomCount"
									th:readonly="${isView}" th:field="*{roomCount}"
									th:errorclass="is-invalid" min="1"> <span
									class="input-group-text">室</span>
							</div>
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('roomCount')}"
								th:errors="*{roomCount}"></div>
						</div>

						<div class="col-md-6">
							<label for="capacity" class="form-label fw-medium"> 収容人数
								<span th:if="!${isView}" class="badge bg-danger text-white ms-1">必須</span>
							</label>
							<div class="input-group">
								<input type="number" class="form-control" id="capacity"
									th:readonly="${isView}" th:field="*{capacity}"
									th:errorclass="is-invalid" min="1"> <span
									class="input-group-text">人</span>
							</div>
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></div>
						</div>

						<div class="col-md-6">
							<label for="businessStartDate" class="form-label fw-medium">
								営業開始（予定）日 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label>
							<input th:if="!${isView}" type="date" class="form-control" id="businessStartDate"
								th:field="*{businessStartDate}" th:errorclass="is-invalid">
							<input th:if="${isView}" type="text" class="form-control" readonly
								th:value="*{businessStartDate}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('businessStartDate')}"
								th:errors="*{businessStartDate}"></div>
						</div>

					</div>
				</div>
			</div>

			<!-- ===== 営業許可等情報 ===== -->
			<div class="card mb-4 shadow-sm">
				<div class="card-header bg-primary text-white py-3">
					<h5 class="mb-0">
						<i class="bi bi-file-earmark-check me-2"></i>営業許可等情報
					</h5>
				</div>
				<div class="card-body bg-light-subtle">
					<div class="row g-3">

						<div class="col-md-4">
							<label for="licenseAddressNo" class="form-label fw-medium">
								住所(郵便番号) <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="licenseAddressNo"
								th:field="*{licenseAddressNo}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('licenseAddressNo')}"
								th:errors="*{licenseAddressNo}"></div>
						</div>

						<div class="col-md-8">
							<label for="licenseAddress" class="form-label fw-medium">
								住所 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="licenseAddress"
								th:field="*{licenseAddress}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('licenseAddress')}"
								th:errors="*{licenseAddress}"></div>
						</div>

						<div class="col-md-6">
							<label for="licenseName" class="form-label fw-medium"> 氏名
								<span th:if="!${isView}" class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="licenseName"
								th:field="*{licenseName}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('licenseName')}"
								th:errors="*{licenseName}"></div>
						</div>

						<div class="col-md-6">
							<label for="licenseNameKana" class="form-label fw-medium">
								氏名(ふりがな) <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="licenseNameKana"
								th:field="*{licenseNameKana}" th:errorclass="is-invalid"
								placeholder="ひらがなで入力" th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('licenseNameKana')}"
								th:errors="*{licenseNameKana}"></div>
						</div>

						<div class="col-md-6">
							<label for="licensePhone" class="form-label fw-medium">
								電話番号 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="tel" class="form-control" id="licensePhone"
								th:field="*{licensePhone}" th:errorclass="is-invalid"
								placeholder="例）03-1234-5678" th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('licensePhone')}"
								th:errors="*{licensePhone}"></div>
						</div>

						<div class="col-md-6">
							<label for="businessType" class="form-label fw-medium">
								営業種別 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <select class="form-select" id="businessType"
								th:field="*{businessType}" th:errorclass="is-invalid"
								th:disabled="${isView}">
								<option value="">選択してください</option>
								<option value="1">ホテル</option>
								<option value="2">旅館</option>
								<option value="3">簡易宿所</option>
								<option value="4">民泊</option>
							</select>
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('businessType')}"
								th:errors="*{businessType}"></div>
						</div>

						<div class="col-md-6">
							<label for="licenseNumber" class="form-label fw-medium">
								許可番号 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="licenseNumber"
								th:field="*{licenseNumber}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('licenseNumber')}"
								th:errors="*{licenseNumber}"></div>
						</div>

					</div>
				</div>
			</div>

			<!-- ===== 施設所有者情報 ===== -->
			<div class="card mb-4 shadow-sm">
				<div class="card-header bg-primary text-white py-3">
					<h5 class="mb-0">
						<i class="bi bi-person-check me-2"></i>施設所有者情報
					</h5>
				</div>
				<div class="card-body bg-light-subtle">
					<div class="row g-3">

						<div class="col-md-4">
							<label for="ownerAddressNo" class="form-label fw-medium">
								住所(郵便番号) <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="ownerAddressNo"
								th:field="*{ownerAddressNo}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('ownerAddressNo')}"
								th:errors="*{ownerAddressNo}"></div>
						</div>

						<div class="col-md-8">
							<label for="ownerAddress" class="form-label fw-medium">
								住所 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="ownerAddress"
								th:field="*{ownerAddress}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('ownerAddress')}"
								th:errors="*{ownerAddress}"></div>
						</div>

						<div class="col-md-6">
							<label for="ownerNameKana" class="form-label fw-medium">
								氏名(ふりがな) <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="ownerNameKana"
								th:field="*{ownerNameKana}" th:errorclass="is-invalid"
								placeholder="ひらがなで入力" th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('ownerNameKana')}"
								th:errors="*{ownerNameKana}"></div>
						</div>

						<div class="col-md-6">
							<label for="ownerName" class="form-label fw-medium"> 氏名 <span
								th:if="!${isView}" class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="ownerName"
								th:field="*{ownerName}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('ownerName')}"
								th:errors="*{ownerName}"></div>
						</div>

						<div class="col-md-6">
							<label for="ownerPhone" class="form-label fw-medium">
								電話番号 <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="tel" class="form-control" id="ownerPhone"
								th:field="*{ownerPhone}" th:errorclass="is-invalid"
								placeholder="例）03-1234-5678" th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('ownerPhone')}"
								th:errors="*{ownerPhone}"></div>
						</div>

					</div>
				</div>
			</div>

			<!-- ===== 書類送付先情報 ===== -->
			<div class="card mb-4 shadow-sm">
				<div class="card-header bg-primary text-white py-3">
					<h5 class="mb-0">
						<i class="bi bi-envelope me-2"></i>書類送付先情報
					</h5>
				</div>
				<div class="card-body bg-light-subtle">
					<div class="row g-3">

						<div class="col-md-4">
							<label for="mailAddressNo" class="form-label fw-medium">
								住所(郵便番号) <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="mailAddressNo"
								th:field="*{mailAddressNo}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('mailAddressNo')}"
								th:errors="*{mailAddressNo}"></div>
						</div>

						<div class="col-md-8">
							<label for="mailAddress" class="form-label fw-medium"> 住所
								<span th:if="!${isView}" class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="mailAddress"
								th:field="*{mailAddress}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('mailAddress')}"
								th:errors="*{mailAddress}"></div>
						</div>

						<div class="col-md-6">
							<label for="mailNameKana" class="form-label fw-medium">
								氏名(ふりがな) <span th:if="!${isView}"
								class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="mailNameKana"
								th:field="*{mailNameKana}" th:errorclass="is-invalid"
								placeholder="ひらがなで入力" th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('mailNameKana')}"
								th:errors="*{mailNameKana}"></div>
						</div>

						<div class="col-md-6">
							<label for="mailName" class="form-label fw-medium"> 氏名 <span
								th:if="!${isView}" class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="text" class="form-control" id="mailName"
								th:field="*{mailName}" th:errorclass="is-invalid"
								th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('mailName')}" th:errors="*{mailName}"></div>
						</div>

						<div class="col-md-6">
							<label for="mailPhone" class="form-label fw-medium"> 電話番号
								<span th:if="!${isView}" class="badge bg-danger text-white ms-1">必須</span>
							</label> <input type="tel" class="form-control" id="mailPhone"
								th:field="*{mailPhone}" th:errorclass="is-invalid"
								placeholder="例）03-1234-5678" th:readonly="${isView}">
							<div class="invalid-feedback"
								th:if="${#fields.hasErrors('mailPhone')}"
								th:errors="*{mailPhone}"></div>
						</div>

					</div>
				</div>
			</div>

			<!-- ===== その他の情報 ===== -->
			<div class="card mb-4 shadow-sm">
				<div class="card-header bg-primary text-white py-3">
					<h5 class="mb-0">
						<i class="bi bi-gear me-2"></i>その他の情報
					</h5>
				</div>
				<div class="card-body bg-light-subtle">
					<div class="row g-3">

						<div class="col-md-6">
							<label class="form-label fw-medium">eLTAX申請</label>
							<div class="mt-2">
								<div class="form-check form-check-inline">
									<input class="form-check-input" type="radio"
										th:field="*{eltaxApplication}" id="eltaxYes" value="1"
										th:disabled="${isView}"> <label
										class="form-check-label" for="eltaxYes">有</label>
								</div>
							</div>
						</div>

						<div class="col-md-6">
							<label for="taxCycle" class="form-label fw-medium">納税周期</label>
							<select class="form-select" id="taxCycle" th:field="*{taxCycle}"
								th:style="${isView} ? 'pointer-events:none; background-color:#e9ecef;' : ''">
								<option value="">選択してください</option>
								<option th:each="opt : ${taxCycleOptions}" th:value="${opt.seq.toPlainString()}"
									th:text="${opt.label}"></option>
							</select>
						</div>

						<div class="col-md-12">
							<label for="remarks" class="form-label fw-medium">備考</label>
							<textarea class="form-control" id="remarks" rows="3"
								th:field="*{remarks}" placeholder="特記事項があれば入力してください"
								th:readonly="${isView}"></textarea>
						</div>

					</div>
				</div>
			</div>

			<!-- ===== 施設営業休止/再開/廃止情報（編集時のみ表示）===== -->
			<div class="card mb-4 shadow-sm" th:if="${isEdit} or ${isView}">
				<div class="card-header bg-warning text-dark py-3">
					<h5 class="mb-0">
						<i class="bi bi-exclamation-triangle me-2"></i>施設営業休止/再開/廃止情報
					</h5>
				</div>
				<div class="card-body bg-light-subtle">
					<div class="row g-3">

						<div class="col-md-12">
							<label class="form-label fw-medium">申告区分</label>
							<div class="mt-1">
								<div class="form-check form-check-inline">
									<input class="form-check-input" type="radio"
										th:field="*{declarationCategory}" id="catSuspension"
										value="休止" th:disabled="${isView}"> <label
										class="form-check-label" for="catSuspension">休止</label>
								</div>
								<div class="form-check form-check-inline">
									<input class="form-check-input" type="radio"
										th:field="*{declarationCategory}" id="catResumption"
										value="再開" th:disabled="${isView}"> <label
										class="form-check-label" for="catResumption">再開</label>
								</div>
								<div class="form-check form-check-inline">
									<input class="form-check-input" type="radio"
										th:field="*{declarationCategory}" id="catAbolition" value="廃止"
										th:disabled="${isView}"> <label
										class="form-check-label" for="catAbolition">廃止</label>
								</div>
							</div>
						</div>

						<div class="col-md-4">
							<label for="suspensionStartDate" class="form-label fw-medium">休止期間（開始日）</label>
							<input type="date" class="form-control" id="suspensionStartDate"
								th:field="*{suspensionStartDate}" th:readonly="${isView}">
						</div>

						<div class="col-md-4">
							<label for="suspensionEndDate" class="form-label fw-medium">休止期間（終了日）</label>
							<input type="date" class="form-control" id="suspensionEndDate"
								th:field="*{suspensionEndDate}" th:readonly="${isView}">
						</div>

						<div class="col-md-4 d-flex align-items-end">
							<div class="form-check">
								<input class="form-check-input" type="checkbox"
									id="suspensionEndDateUndecided"
									th:field="*{suspensionEndDateUndecided}"
									th:disabled="${isView}"> <label
									class="form-check-label" for="suspensionEndDateUndecided">未定</label>
							</div>
						</div>

						<div class="col-md-6">
							<label for="resumptionOrAbolitionDate"
								class="form-label fw-medium">再開または廃止日</label> <input type="date"
								class="form-control" id="resumptionOrAbolitionDate"
								th:field="*{resumptionOrAbolitionDate}" th:readonly="${isView}">
						</div>

						<div class="col-md-6">
							<label for="suspensionOrAbolitionReason"
								class="form-label fw-medium">休止または廃止理由</label> <input
								type="text" class="form-control"
								id="suspensionOrAbolitionReason"
								th:field="*{suspensionOrAbolitionReason}"
								th:readonly="${isView}">
						</div>

					</div>
				</div>
			</div>

			<!-- ===== アクションボタン ===== -->
			<div class="d-flex justify-content-center gap-3 py-4 mb-5">
				<th:block th:if="!${isView}">
					<button type="button" id="openConfirmModalBtn"
						class="btn btn-lg px-5"
						th:classappend="${isEdit} ? 'btn-success' : 'btn-primary'">
						<i
							th:class="${isEdit} ? 'bi bi-pencil-square me-2' : 'bi bi-save me-2'"></i>
						<span th:text="${isEdit} ? '更新する' : '登録する'"></span>
					</button>
				</th:block>
				<th:block th:if="${isView}">
					<a th:href="@{/tokugimu/edit/{id}(id=${editId})}"
						class="btn btn-success btn-lg px-5"> <i
						class="bi bi-pencil-square me-2"></i>編集する
					</a>
				</th:block>
				<a th:href="@{/tokugimu/list}"
					class="btn btn-outline-secondary btn-lg px-4"> <i
					class="bi bi-arrow-left me-2"></i>一覧に戻る
				</a>
			</div>
		</form>

		<!-- 確認モーダル（登録と更新） -->
		<div th:if="!${isView}"
			th:replace="~{layout/components :: confirmModal('registerModal', ${isEdit} ? '更新確認' : '登録確認', ${isEdit} ? 'この内容で更新します。よろしいですか？' : 'この内容で登録します。よろしいですか？', 'registerForm', ${isEdit} ? 'btn-success' : 'btn-primary', ${isEdit} ? '更新' : '登録')}"></div>

		<!-- 宛名検索モーダル -->
		<div th:replace="~{layout/components :: addressSearchModal}"></div>
	</div>

	<th:block layout:fragment="scripts">
		<script th:src="@{/js/t_tokugimu_config.js}"></script>
	</th:block>
</body>
</html>
