<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title layout:title-pattern="$CONTENT_TITLE - 宿泊税LGWAN-ASPシステム">宿泊税LGWAN-ASPシステム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/accommodation.css}">
</head>
<body class="vh-100 overflow-hidden">

<div class="d-flex h-100">

    <!-- ========== サイドバー ========== -->
    <nav id="sidebar" class="d-flex flex-column flex-shrink-0 bg-dark text-white" style="width: 260px; overflow-y: auto;">

        <!-- システム名 -->
        <div class="px-3 py-3 border-bottom border-secondary">
            <h5 class="mb-0 fw-bold text-white">
                <i class="bi bi-building me-2 text-info"></i>宿泊税システム
            </h5>
        </div>

        <div class="px-2 py-2 flex-grow-1">

            <!-- ===== メイン ===== -->
            <div class="text-uppercase text-secondary small fw-semibold px-2 pt-3 pb-1">メイン</div>

            <!-- 照会 -->
            <div class="accordion accordion-flush" id="mainQueryAccordion">
                <div class="accordion-item bg-transparent border-0">
                    <h2 class="accordion-header">
                        <button class="accordion-button bg-transparent text-white collapsed py-2 px-2 rounded" type="button"
                                data-bs-toggle="collapse" data-bs-target="#mainQuery">
                            <i class="bi bi-search me-2 text-info"></i>照会
                        </button>
                    </h2>
                    <div id="mainQuery" class="accordion-collapse collapse">
                        <div class="accordion-body py-1 px-0">
                            <ul class="nav flex-column ms-3">
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link"
                                       th:href="@{/collector/list}"
                                       th:classappend="${#strings.contains(currentUri, '/collector')} ? 'text-white fw-medium' : ''">
                                        <i class="bi bi-people me-2"></i>特別徴収義務者管理台帳
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link" th:href="@{#}">
                                        <i class="bi bi-person-lines-fill me-2"></i>宛名情報
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link" th:href="@{#}">
                                        <i class="bi bi-cash-coin me-2"></i>特別徴収義務者交付金
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 取り込み -->
            <div class="accordion accordion-flush" id="mainImportAccordion">
                <div class="accordion-item bg-transparent border-0">
                    <h2 class="accordion-header">
                        <button class="accordion-button bg-transparent text-white collapsed py-2 px-2 rounded" type="button"
                                data-bs-toggle="collapse" data-bs-target="#mainImport">
                            <i class="bi bi-upload me-2 text-info"></i>取り込み
                        </button>
                    </h2>
                    <div id="mainImport" class="accordion-collapse collapse">
                        <div class="accordion-body py-1 px-0">
                            <ul class="nav flex-column ms-3">
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link" th:href="@{#}">
                                        <i class="bi bi-person-lines-fill me-2"></i>宛名情報
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link" th:href="@{#}">
                                        <i class="bi bi-file-earmark-arrow-down me-2"></i>電子申告情報
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 帳票発行 -->
            <div class="accordion accordion-flush" id="mainReportAccordion">
                <div class="accordion-item bg-transparent border-0">
                    <h2 class="accordion-header">
                        <button class="accordion-button bg-transparent text-white collapsed py-2 px-2 rounded" type="button"
                                data-bs-toggle="collapse" data-bs-target="#mainReport">
                            <i class="bi bi-printer me-2 text-info"></i>帳票発行
                        </button>
                    </h2>
                    <div id="mainReport" class="accordion-collapse collapse">
                        <div class="accordion-body py-1 px-0">
                            <ul class="nav flex-column ms-3">
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link" th:href="@{#}">
                                        <i class="bi bi-file-earmark-text me-2"></i>各種帳票
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== システム管理（ADMIN のみ表示） ===== -->
            <div sec:authorize="hasRole('ADMIN')">
            <div class="text-uppercase text-secondary small fw-semibold px-2 pt-3 pb-1 mt-2 border-top border-secondary">システム管理</div>

            <!-- 照会（管理者） -->
            <div class="accordion accordion-flush" id="adminQueryAccordion">
                <div class="accordion-item bg-transparent border-0">
                    <h2 class="accordion-header">
                        <button class="accordion-button bg-transparent text-white collapsed py-2 px-2 rounded" type="button"
                                data-bs-toggle="collapse" data-bs-target="#adminQuery">
                            <i class="bi bi-search me-2 text-warning"></i>照会
                        </button>
                    </h2>
                    <div id="adminQuery" class="accordion-collapse collapse">
                        <div class="accordion-body py-1 px-0">
                            <ul class="nav flex-column ms-3">
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link"
                                       th:href="@{/admin/user-search}"
                                       th:classappend="${#strings.contains(currentUri, '/admin/user')} ? 'text-white fw-medium' : ''">
                                        <i class="bi bi-person-search me-2"></i>ユーザー検索
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link" th:href="@{#}">
                                        <i class="bi bi-journal-text me-2"></i>システムログ
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link"
                                       th:href="@{/admin/tax-system-inquiry}"
                                       th:classappend="${#strings.contains(currentUri, '/admin/tax-system')} ? 'text-white fw-medium' : ''">
                                        <i class="bi bi-sliders me-2"></i>税制照会
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link"
                                       th:href="@{/admin/tax-cycle-inquiry}"
                                       th:classappend="${#strings.contains(currentUri, '/admin/tax-cycle')} ? 'text-white fw-medium' : ''">
                                        <i class="bi bi-calendar-check me-2"></i>納税周期一覧
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 設定 -->
            <div class="accordion accordion-flush" id="adminSettingAccordion">
                <div class="accordion-item bg-transparent border-0">
                    <h2 class="accordion-header">
                        <button class="accordion-button bg-transparent text-white collapsed py-2 px-2 rounded" type="button"
                                data-bs-toggle="collapse" data-bs-target="#adminSetting">
                            <i class="bi bi-gear me-2 text-warning"></i>設定
                        </button>
                    </h2>
                    <div id="adminSetting" class="accordion-collapse collapse">
                        <div class="accordion-body py-1 px-0">
                            <ul class="nav flex-column ms-3">
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link" th:href="@{#}">
                                        <i class="bi bi-file-earmark-ruled me-2"></i>帳票出力設定
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link" th:href="@{#}">
                                        <i class="bi bi-filetype-csv me-2"></i>CSV取込設定
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link"
                                       th:href="@{/admin/tax-system-registration}">
                                        <i class="bi bi-sliders me-2"></i>税制設定
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link"
                                       th:href="@{/admin/tax-cycle-registration}">
                                        <i class="bi bi-calendar-check me-2"></i>納税周期
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 py-1 sidebar-link" th:href="@{#}">
                                        <i class="bi bi-shield-lock me-2"></i>権限管理
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            </div><!-- /システム管理 -->

        </div>
    </nav>
    <!-- ========== /サイドバー ========== -->

    <!-- 右カラム（ヘッダー＋メイン） -->
    <div class="d-flex flex-column flex-grow-1 overflow-hidden">

        <!-- ========== ヘッダー ========== -->
        <header class="bg-white shadow-sm d-flex align-items-center justify-content-between px-4 flex-shrink-0" style="height: 56px;">
            <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggle">
                <i class="bi bi-list"></i>
            </button>
            <span class="text-muted small d-none d-md-inline">宿泊税LGWAN-ASPシステム</span>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted small">
                    <i class="bi bi-person-circle me-1"></i>
                    <span th:text="${#authentication?.name}">ユーザー</span>
                </span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>ログアウト
                    </button>
                </form>
            </div>
        </header>
        <!-- ========== /ヘッダー ========== -->

        <!-- ========== メインコンテンツ ========== -->
        <main class="flex-grow-1 overflow-auto bg-light">
            <div layout:fragment="content"></div>
        </main>
        <!-- ========== /メインコンテンツ ========== -->

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // アクティブなアコーディオンを自動展開
    document.querySelectorAll('.sidebar-link').forEach(link => {
        if (link.classList.contains('text-white') && link.classList.contains('fw-medium')) {
            const collapse = link.closest('.accordion-collapse');
            if (collapse) {
                collapse.classList.add('show');
                collapse.previousElementSibling?.querySelector('.accordion-button')?.classList.remove('collapsed');
            }
        }
    });
    // モバイル用サイドバートグル
    document.getElementById('sidebarToggle')?.addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('d-none');
    });
</script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
