<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      lang="ja">
<head>
    <title>特別徴収義務者管理台帳</title>
</head>
<body>
<div layout:fragment="content" class="container-fluid p-4">

    <h2 class="page-title">
        <i class="bi bi-building me-2"></i>特別徴収義務者管理
    </h2>

    <!-- 成功メッセージ -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 検索条件エリア -->
    <div class="card search-card mb-4">
        <div class="card-header bg-primary text-white py-3">
            <h5 class="mb-0"><i class="bi bi-search me-2"></i>検索条件</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/collector/list}" th:object="${searchForm}" method="get">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label for="registrationNo" class="form-label">登録番号</label>
                        <input type="text" class="form-control" id="registrationNo"
                               th:field="*{registrationNo}" placeholder="例：T001001">
                    </div>
                    <div class="col-md-3">
                        <label for="obligorName" class="form-label">氏名/名称</label>
                        <input type="text" class="form-control" id="obligorName"
                               th:field="*{obligorName}" placeholder="事業者名を入力">
                    </div>
                    <div class="col-md-3">
                        <label for="facilityName" class="form-label">施設名</label>
                        <input type="text" class="form-control" id="facilityName"
                               th:field="*{facilityName}" placeholder="施設名を入力">
                    </div>
                    <div class="col-md-3">
                        <label for="businessType" class="form-label">営業種別</label>
                        <select class="form-select" id="businessType" th:field="*{businessType}">
                            <option value="">すべて</option>
                            <option value="hotel">ホテル</option>
                            <option value="ryokan">旅館</option>
                            <option value="simple">簡易宿所</option>
                            <option value="minshuku">民宿</option>
                            <option value="pension">ペンション</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="consolidationTarget" class="form-label">合算対象</label>
                        <select class="form-select" id="consolidationTarget" th:field="*{consolidationTarget}">
                            <option value="">すべて</option>
                            <option value="target">対象</option>
                            <option value="non-target">非対象</option>
                        </select>
                    </div>
                    <div class="col-md-9 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search me-1"></i>検索
                        </button>
                        <a th:href="@{/collector/list}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>リセット
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- ボタンエリア -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex gap-2">
            <a th:href="@{/collector/registration}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>新規登録
            </a>
            <a th:href="@{/collector/tax-manager-registration}" class="btn btn-info">
                <i class="bi bi-person-plus me-1"></i>納税管理人登録/編集
            </a>
            <a th:href="@{/declaration/consolidated-declaration-registration}" class="btn btn-warning">
                <i class="bi bi-file-earmark-plus me-1"></i>合算申告登録/編集
            </a>
        </div>
        <span class="text-muted small">
            検索結果: <span th:text="${#lists.size(items)}">0</span> 件
        </span>
    </div>

    <!-- 一覧テーブル -->
    <div class="table-container">
        <table class="table table-striped table-hover mb-0">
            <thead>
                <tr>
                    <th style="width: 120px;">登録番号</th>
                    <th>事業所名称</th>
                    <th style="width: 150px;">施設名</th>
                    <th style="width: 120px;">営業種別</th>
                    <th style="width: 100px;" class="text-center">合算対象</th>
                    <th style="width: 160px;" class="text-center">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${items}">
                    <td>
                        <a th:href="@{/declaration/payment-management(id=${item.registrationNo})}"
                           class="registration-link" th:text="${item.registrationNo}"></a>
                    </td>
                    <td th:text="${item.obligorName}"></td>
                    <td th:text="${item.facilityName}"></td>
                    <td th:text="${item.businessTypeLabel}"></td>
                    <td class="text-center">
                        <span th:if="${item.consolidationTarget == 'target'}"
                              class="badge badge-target">対象</span>
                        <span th:unless="${item.consolidationTarget == 'target'}"
                              class="badge badge-non-target">非対象</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/collector/edit/{id}(id=${item.id})}"
                           class="btn btn-outline-primary btn-sm me-1">
                            <i class="bi bi-pencil me-1"></i>編集
                        </a>
                        <!-- data-* 属性で値を渡し、onclick では this.dataset を参照 -->
                        <button type="button" class="btn btn-outline-danger btn-sm delete-btn"
                                th:data-id="${item.id}"
                                th:data-name="${item.obligorName}">
                            <i class="bi bi-trash me-1"></i>削除
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(items)}">
                    <td colspan="6" class="text-center text-muted py-4">
                        <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                        該当するデータが見つかりませんでした。
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 各行の削除フォーム（隠し） -->
    <form th:each="item : ${items}"
          th:id="'deleteForm-' + ${item.id}"
          th:action="@{/collector/delete/{id}(id=${item.id})}"
          method="post" class="d-none">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>

    <!-- ページネーション -->
    <nav aria-label="ページネーション" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item disabled"><a class="page-link" href="#" tabindex="-1">前へ</a></li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">次へ</a></li>
        </ul>
    </nav>

    <!-- 削除確認モーダル（共通フラグメント） -->
    <div th:replace="~{layout/components :: confirmModal('deleteModal', '削除確認', '選択したデータを削除します。この操作は取り消せません。よろしいですか？', 'deleteForm-0', 'btn-danger', '削除する')}"></div>

</div>

<th:block layout:fragment="scripts">
    <script>
        document.querySelectorAll('.delete-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const id = this.dataset.id;
                const name = this.dataset.name;
                const modal = document.getElementById('deleteModal');
                modal.querySelector('.modal-body p').textContent =
                    '「' + name + '」を削除します。この操作は取り消せません。よろしいですか？';
                modal.querySelector('[data-form-id]').dataset.formId = 'deleteForm-' + id;
                new bootstrap.Modal(modal).show();
            });
        });
    </script>
</th:block>
</body>
</html>
