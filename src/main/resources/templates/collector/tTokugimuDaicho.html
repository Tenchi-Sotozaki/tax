<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}" lang="ja">
<head>
<title>特別徴収義務者管理台帳</title>
<style>
tbody tr.row-selected {
	background-color: #e8f0fe !important;
}

.sticky-table thead th {
	position: sticky;
	top: 0;
	z-index: 1;
}

.table-scroll {
	max-height: 55vh;
	min-height: 200px;
	overflow-y: auto;
	overflow-x: auto;
}

@media ( max-width : 991.98px) {
	.toolbar-divider {
		display: none !important;
	}
}
</style>
</head>
<body>
	<div layout:fragment="content" class="container-fluid px-4 py-3">

		<!-- ページヘッダー -->
		<div
			class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
			<h5 class="mb-0 fw-bold text-dark">
				<i class="bi bi-building text-primary me-2"></i>特別徴収義務者管理台帳
			</h5>
			<span class="text-muted small"> 検索結果: <strong
				th:text="${#lists.size(items)}">0</strong> 件
			</span>
		</div>

		<!-- フラッシュメッセージ -->
		<div th:if="${successMessage}"
			class="alert alert-success alert-dismissible fade show py-2 mb-3"
			role="alert">
			<i class="bi bi-check-circle-fill me-2"></i> <span
				th:text="${successMessage}"></span>
			<button type="button" class="btn-close btn-sm"
				data-bs-dismiss="alert"></button>
		</div>

		<!-- ========== 検索条件（アコーディオン） ========== -->
		<div class="accordion mb-3 shadow-sm" id="searchAccordion">
			<div class="accordion-item border">
				<h2 class="accordion-header">
					<button class="accordion-button py-2 fw-semibold" type="button"
						data-bs-toggle="collapse" data-bs-target="#searchPanel">
						<i class="bi bi-funnel me-2 text-primary"></i>検索条件
					</button>
				</h2>
				<div id="searchPanel" class="accordion-collapse collapse show">
					<div class="accordion-body pt-3 pb-2 px-3">
						<form th:action="@{/collector/list}" th:object="${searchForm}"
							method="get">
							<!-- SP:1列 / タブレット:2列 / PC:4列 -->
							<div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-2 mb-2">
								<div class="col">
									<label class="form-label form-label-sm fw-medium mb-1">指定番号</label>
									<input type="text" class="form-control form-control-sm"
										th:field="*{shiteiNo}" placeholder="指定番号">
								</div>
								<div class="col">
									<label class="form-label form-label-sm fw-medium mb-1">氏名/名称</label>
									<input type="text" class="form-control form-control-sm"
										th:field="*{name}" placeholder="氏名または名称">
								</div>
								<div class="col">
									<label class="form-label form-label-sm fw-medium mb-1">施設名称</label>
									<input type="text" class="form-control form-control-sm"
										th:field="*{shisetsuName}" placeholder="施設名称">
								</div>
								<div class="col">
									<label class="form-label form-label-sm fw-medium mb-1">営業種別</label>
									<select class="form-select form-select-sm"
										th:field="*{kyokaShu}">
										<option value="999">すべて</option>
										<option value="1">ホテル</option>
										<option value="2">旅館</option>
										<option value="3">簡易宿所</option>
										<option value="4">民泊</option>
									</select>
								</div>
								<div class="col">
									<label class="form-label form-label-sm fw-medium mb-1">合算対象</label>
									<select class="form-select form-select-sm"
										th:field="*{gasanTaisho}">
										<option value="999">すべて</option>
										<option value="1">非対象</option>
										<option value="2">対象</option>
									</select>
								</div>
								<div class="col">
									<label class="form-label form-label-sm fw-medium mb-1">ステータス</label>
									<select class="form-select form-select-sm" th:field="*{status}">
										<option value="999">すべて</option>
										<option value="1">営業中</option>
										<option value="2">休止</option>
										<option value="3">廃止</option>
									</select>
								</div>
								<div class="col">
									<label class="form-label form-label-sm fw-medium mb-1">個人番号</label>
									<input type="text" class="form-control form-control-sm"
										th:field="*{kojinNo}" placeholder="個人番号">
								</div>
								<div class="col">
									<label class="form-label form-label-sm fw-medium mb-1">法人番号</label>
									<input type="text" class="form-control form-control-sm"
										th:field="*{hojinNo}" placeholder="法人番号">
								</div>
							</div>
							<div class="d-flex justify-content-end gap-2 pt-1 border-top">
								<a th:href="@{/collector/list}"
									class="btn btn-outline-secondary btn-sm"> <i
									class="bi bi-arrow-counterclockwise me-1"></i>リセット
								</a>
								<button type="submit" class="btn btn-primary btn-sm px-4">
									<i class="bi bi-search me-1"></i>検索する
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>

		<!-- ========== ツールバー（ボタンエリア） ========== -->
		<div class="card shadow-sm mb-2">
			<div class="card-body py-2 px-3">
				<div class="d-flex flex-wrap align-items-center gap-1"
					style="row-gap: 0.4rem;">
					<!-- グループ1: 基本操作 -->
					<div class="d-flex flex-wrap gap-1">
						<a th:href="@{/collector/registration}"
							class="btn btn-primary btn-sm"> <i
							class="bi bi-plus-circle me-1"></i>新規登録
						</a>
						<button type="button" id="btnView"
							class="btn btn-outline-primary btn-sm">
							<i class="bi bi-eye me-1"></i>照会
						</button>
						<button type="button" id="btnDelete"
							class="btn btn-outline-danger btn-sm">
							<i class="bi bi-trash me-1"></i>削除
						</button>
					</div>
					<div class="vr mx-1 toolbar-divider"></div>
					<!-- グループ2: 納税管理人 -->
					<div class="d-flex flex-wrap gap-1">
						<button type="button" id="btnTaxManager"
							class="btn btn-info btn-sm">
							<i class="bi bi-person-plus me-1"></i>納税管理人登録
						</button>
						<button type="button" id="btnTaxManagerView"
							class="btn btn-outline-info btn-sm">
							<i class="bi bi-person me-1"></i>納税管理人照会
						</button>
					</div>
					<div class="vr mx-1 toolbar-divider"></div>
					<!-- グループ3: 納入台帳 -->
					<button type="button" id="btnPaymentLedger"
						class="btn btn-outline-secondary btn-sm">
						<i class="bi bi-currency-yen me-1"></i>納入金額管理台帳
					</button>
					<div class="vr mx-1 toolbar-driver"></div>
					<!-- グループ4: 合算申告 -->
					<div class="d-flex flex-wrap gap-1">
						<button type="button" id="btnConsolidated"
							class="btn btn-warning btn-sm">
							<i class="bi bi-file-earmark-plus me-1"></i>合算申告登録
						</button>
						<button type="button" id="btnConsolidatedView"
							class="btn btn-outline-warning btn-sm">
							<i class="bi bi-file-earmark me-1"></i>合算申告照会
						</button>
					</div>
					<div class="vr mx-1 toolbar-divider"></div>
					<!-- グループ5: その他 -->
					<div class="d-flex flex-wrap gap-1">
						<button type="button" id="btnCorrection"
							class="btn btn-outline-secondary btn-sm">
							<i class="bi bi-arrow-repeat me-1"></i>更生請求
						</button>
						<button type="button" id="btnReport"
							class="btn btn-outline-dark btn-sm">
							<i class="bi bi-printer me-1"></i>帳票発行
						</button>
					</div>
				</div>
			</div>
		</div>

		<!-- ========== 一覧テーブル ========== -->
		<div class="card shadow-sm">
			<div class="card-body p-0">
				<div class="table-scroll">
					<table
						class="table table-bordered table-hover table-sm align-middle mb-0 sticky-table">
						<thead class="table-primary">
							<tr>
								<th style="width: 40px" class="text-center"></th>
								<th style="min-width: 100px">指定番号</th>
								<th style="min-width: 140px">氏名/名称</th>
								<th style="min-width: 140px">事業所名称</th>
								<th style="min-width: 80px" class="text-center">ステータス</th>
								<th style="min-width: 80px" class="text-center">合算対象</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="item : ${items}">
								<td class="text-center"><input type="checkbox"
									class="form-check-input row-select" th:data-id="${item.id}">
								</td>
								<td class="fw-bold text-primary"
									th:text="${item.shiteiNo}"></td>
								<td th:text="${item.Name}"></td>
								<td th:text="${item.shisetsuName}"></td>
								<td class="text-center"><span class="badge bg-success"
									th:if="${item.status == '1'}">営業中</span> <span
									class="badge bg-warning text-dark"
									th:if="${item.status == '2'}">休止</span> <span
									class="badge bg-secondary" th:if="${item.status == '3'}">廃止</span>
									<span class="text-muted small"
									th:if="${item.status == null or item.status == ''}">-</span></td>
								<td class="text-center"><span class="badge bg-primary"
									th:if="${item.consolidationTarget == 'target'}">対象</span> <span
									class="badge bg-light text-muted border"
									th:unless="${item.consolidationTarget == 'target'}">非対象</span>
								</td>
							</tr>
							<tr th:if="${#lists.isEmpty(items)}">
								<td colspan="7" class="text-center text-muted py-5"><i
									class="bi bi-inbox fs-2 d-block mb-2 text-secondary"></i>
									該当するデータが見つかりませんでした。</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
			<div class="card-footer bg-white py-2 border-top">
				<nav>
					<ul class="pagination pagination-sm justify-content-center mb-0">
						<li class="page-item disabled"><a class="page-link" href="#">前へ</a></li>
						<li class="page-item active"><a class="page-link" href="#">1</a></li>
						<li class="page-item"><a class="page-link" href="#">次へ</a></li>
					</ul>
				</nav>
			</div>
		</div>

		<!-- 削除フォーム（隠し） -->
		<form th:each="item : ${items}" th:id="'deleteForm-' + ${item.id}"
			th:action="@{/collector/delete/{id}(id=${item.id})}" method="post"
			class="d-none">
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}">
		</form>

		<!-- 削除確認モーダル -->
		<div
			th:replace="~{layout/components :: confirmModal('deleteModal', '削除確認', '選択したデータをデータベースから完全に削除します。関連するすべてのデータも削除されます。この操作は取り消せません。よろしいですか？', 'deleteForm-0', 'btn-danger', '削除する')}"></div>

	</div>

	<th:block layout:fragment="scripts">
		<script th:src="@{/js/t_tokugimu_daicho.js}"></script>
	</th:block>
</body>
</html>
