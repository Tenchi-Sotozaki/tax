<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}" lang="ja">

<head>
    <title th:text="${(isView ?: false) ? '納税管理人照会' : ((isEdit ?: false) ? '納税管理人編集' : '納税管理人登録')}">納税管理人登録/編集</title>
</head>

<body>
	<div layout:fragment="content" class="container-fluid p-4">

		<div
			class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
			<h2 class="h2">
				<i class="bi bi-person-lines-fill me-2 text-primary" th:if="${isView ?: false}"></i>
				<i class="bi bi-person-gear me-2 text-primary" th:unless="${isView ?: false}"></i>

				<span th:text="${(isView ?: false) ? '納税管理人照会' : ((isEdit ?: false) ? '納税管理人編集' : '納税管理人登録')}"></span>
			</h2>
			<span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 fs-6">
				<i
					th:class="${(isView ?: false) ? 'bi bi-eye me-1' : ((isEdit ?: false) ? 'bi bi-pencil-square me-1' : 'bi bi-plus-circle me-1')}"></i>
				<span th:text="${(isView ?: false) ? '照会' : ((isEdit ?: false) ? '編集' : '新規登録')}"></span>
			</span>
		</div>

		<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
			<i class="bi bi-check-circle-fill me-2"></i>
			<span th:text="${successMessage}"></span>
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>
		<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
			<i class="bi bi-exclamation-triangle-fill me-2"></i>
			<span th:text="${errorMessage}"></span>
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>

		<form id="taxManagerForm" th:action="@{/collector/edit/{id}(id=${taxManagerForm.collectorId})}"
		      th:object="${taxManagerForm}" method="post">
		    
		    <input type="hidden" th:field="*{collectorId}" />
			<input type="hidden" th:field="*{edit}" />

			<div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger" role="alert">
				<i class="bi bi-exclamation-triangle-fill me-2"></i>
				入力内容に <span th:text="${#fields.errors().size()}"></span> 件のエラーがあります。
			</div>

			<div class="card mb-4 shadow-sm">
				<div class="card-header bg-primary text-white py-3">
					<h5 class="mb-0"><i class="bi bi-person-vcard me-2"></i>納税管理人情報</h5>
				</div>
				<div class="card-body bg-light-subtle">
					<div class="row g-3">
						<div class="col-md-4">
							<label for="registrationDate" class="form-label fw-medium">
								登録日 <span class="badge bg-danger text-white ms-1" th:if="${!isView}">必須</span>
							</label>
							<input type="date" class="form-control" th:field="*{registrationDate}"
								th:readonly="${isView}">
						</div>

						<div class="col-md-4 d-flex align-items-end" th:if="${!isView}">
							<button type="button" class="btn btn-outline-info" data-bs-toggle="modal"
								data-bs-target="#addressSearchModal">
								<i class="bi bi-search me-1"></i>宛名検索
							</button>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-medium">特別徴収義務者</label>
							<input type="text" class="form-control" th:field="*{obligorName}" readonly>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-medium">施設名称</label>
							<input type="text" class="form-control" th:field="*{facilityName}" readonly>
						</div>

						<div class="col-md-12">
							<label class="form-label fw-medium">住所（所在地）</label>
							<input type="text" class="form-control" id="managerAddress" th:field="*{managerAddress}"
								th:readonly="${isView}">
						</div>

						<div class="col-md-6">
							<label class="form-label fw-medium">氏名</label>
							<input type="text" class="form-control" id="managerName" th:field="*{managerName}"
								th:readonly="${isView}">
						</div>

						<div class="col-md-6">
							<label class="form-label fw-medium">ふりがな</label>
							<input type="text" class="form-control" id="managerNameKana" th:field="*{managerNameKana}"
								th:readonly="${isView}">
						</div>

						<div class="col-md-6">
							<label class="form-label fw-medium">電話番号</label>
							<input type="tel" class="form-control" id="managerPhone" th:field="*{managerPhone}"
								th:readonly="${isView}">
						</div>

						<div class="col-md-6 d-flex align-items-end">
							<div class="form-check">
								<input class="form-check-input" type="checkbox" th:field="*{exemptionFlag}"
									id="exemptionFlag" th:disabled="${isView}">
								<label class="form-check-label fw-medium" for="exemptionFlag">選任免除</label>
							</div>
						</div>

						<div class="col-md-12" id="exemptionReasonArea" style="display: none;">
							<label for="exemptionReason" class="form-label fw-medium">選任免除理由</label>
							<textarea class="form-control" id="exemptionReason" rows="3" th:field="*{exemptionReason}"
								th:readonly="${isView}"></textarea>
						</div>
					</div>
				</div>
			</div>

			<div class="d-flex justify-content-center gap-3 py-4 mb-5">
				<button type="submit" class="btn btn-primary btn-lg px-5" th:if="${!isView}">
					<i class="bi bi-save me-2"></i>
					<span th:text="${isEdit ? '更新する' : '登録する'}"></span>
				</button>
				<a th:href="@{/collector/edit/{id}(id=${taxManagerForm.tokugimuId})}"
					class="btn btn-primary btn-lg px-5" th:if="${isView}">
					<i class="bi bi-pencil-square me-2"></i>編集する
				</a>
				<a th:href="@{/controller/list}" class="btn btn-outline-secondary btn-lg px-4">
					<i class="bi bi-arrow-left me-2"></i>一覧に戻る
				</a>
			</div>
		</form>

		<div class="modal fade" id="addressSearchModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-xl">
				<div class="modal-content">
					<div class="modal-header bg-info text-white">
						<h5 class="modal-title"><i class="bi bi-search me-2"></i>宛名検索</h5>
						<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body">
						<div class="row g-3 mb-3">
							<div class="col-md-3">
								<label class="form-label fw-medium">宛名番号</label>
								<input type="text" class="form-control" id="searchAddressNumber">
							</div>
							<div class="col-md-3">
								<label class="form-label fw-medium">氏名</label>
								<input type="text" class="form-control" id="searchName">
							</div>
							<div class="col-md-4">
								<label class="form-label fw-medium">住所</label>
								<input type="text" class="form-control" id="searchAddress">
							</div>
							<div class="col-md-2 d-flex align-items-end">
								<button type="button" class="btn btn-primary w-100" id="btnAddressSearch">検索</button>
							</div>
						</div>
						<div id="searchResultArea" style="display: none;">
							<div class="table-responsive">
								<table class="table table-striped table-hover align-middle">
									<thead class="table-primary">
										<tr>
											<th>宛名番号</th>
											<th>氏名</th>
											<th>ふりがな</th>
											<th>住所</th>
											<th>電話番号</th>
											<th>選択</th>
										</tr>
									</thead>
									<tbody id="searchResultBody"></tbody>
								</table>
							</div>
						</div>
						<div id="searchNoResult" class="text-center text-muted py-4" style="display: none;">該当なし</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<th:block layout:fragment="scripts">
		<script th:inline="javascript">
			/*<![CDATA[*/
			document.addEventListener('DOMContentLoaded', function () {
				// --- ① 選任免除の表示制御 ---
				const exemptionFlag = document.getElementById('exemptionFlag');
				const exemptionReasonArea = document.getElementById('exemptionReasonArea');

				if (exemptionFlag && exemptionReasonArea) {
					const toggleExemptionArea = () => {
						exemptionReasonArea.style.display = exemptionFlag.checked ? 'block' : 'none';
					};
					toggleExemptionArea();
					exemptionFlag.addEventListener('change', toggleExemptionArea);
				}

				// --- ② 宛名検索ボタン ---
				const btnSearch = document.getElementById('btnAddressSearch');
				if (btnSearch) {
					btnSearch.addEventListener('click', async function () {
						const params = new URLSearchParams();
						params.append('addressNumber', document.getElementById('searchAddressNumber').value);
						params.append('name', document.getElementById('searchName').value);
						params.append('address', document.getElementById('searchAddress').value);

						const contextPath = /*[[@{/}]]*/ '/accommodation-tax/';
						const url = contextPath + 'api/address/search?' + params.toString();

						try {
							const res = await fetch(url, {credentials: 'same-origin'});
							const data = await res.json();
							renderSearchResults(data);
						} catch (e) {
							console.error('検索エラー:', e);
							alert('検索中にエラーが発生しました。');
						}
					});
				}

				// --- ③ モーダルリセット ---
				const searchModal = document.getElementById('addressSearchModal');
				if (searchModal) {
					searchModal.addEventListener('show.bs.modal', function () {
						document.getElementById('searchAddressNumber').value = '';
						document.getElementById('searchName').value = '';
						document.getElementById('searchAddress').value = '';
						document.getElementById('searchResultBody').innerHTML = '';
						document.getElementById('searchResultArea').style.display = 'none';
						document.getElementById('searchNoResult').style.display = 'none';
					});
				}
			});

			function renderSearchResults(data) {
				const tbody = document.getElementById('searchResultBody');
				const resultArea = document.getElementById('searchResultArea');
				const noResult = document.getElementById('searchNoResult');

				tbody.innerHTML = '';
				if (data.length === 0) {
					resultArea.style.display = 'none';
					noResult.style.display = 'block';
					return;
				}

				noResult.style.display = 'none';
				resultArea.style.display = 'block';

				data.forEach(function (item) {
					const tr = document.createElement('tr');
					tr.innerHTML = `
						<td>${escHtml(item.addressNumber)}</td>
						<td>${escHtml(item.name)}</td>
						<td class="text-muted">${escHtml(item.nameKana)}</td>
						<td>${escHtml(item.address)}</td>
						<td>${escHtml(item.phone)}</td>
						<td class="text-center">
							<button type="button" class="btn btn-primary btn-sm btn-select-address">選択</button>
						</td>`;

					tr.querySelector('.btn-select-address').addEventListener('click', function () {
						document.getElementById('managerAddress').value = item.address;
						document.getElementById('managerName').value = item.name;
						document.getElementById('managerNameKana').value = item.nameKana;
						document.getElementById('managerPhone').value = item.phone;
						bootstrap.Modal.getInstance(document.getElementById('addressSearchModal')).hide();
					});
					tbody.appendChild(tr);
				});
			}

			function escHtml(str) {
				if (!str) return '';
				return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
			}
			/*]]>*/
		</script>
	</th:block>
</body>

</html>
