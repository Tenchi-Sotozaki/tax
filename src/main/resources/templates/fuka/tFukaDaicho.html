<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}" lang="ja">

<head>
	<title>納入金額管理台帳</title>
</head>

<body>
	<div layout:fragment="content" class="container-fluid p-4">

		<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
			<h2 class="h2">
				<i class="bi bi-currency-yen text-primary me-2"></i>納入金額管理台帳
			</h2>
		</div>

		<!-- 抽出条件フォーム -->
		<div class="card mb-3 shadow-sm">
			<div class="card-header bg-light py-2">
				<h6 class="mb-0"><i class="bi bi-funnel me-2"></i>抽出条件</h6>
			</div>
			<div class="card-body py-3">
				<form th:action="@{/declaration/payment-ledger/{id}(id=${fukaDaichoForm.shiteiNo})}" th:object="${fukaDaichoForm}" method="get">
					<div class="row g-3 align-items-end">
						<div class="col-md-3">
						    <label for="nendo" class="form-label fw-medium">年度</label>
						    <input type="text" 
						           class="form-control" 
						           th:field="*{nendo}" 
						           maxlength="4" 
						           placeholder="例: 2026">
						</div>
						<div class="col-md-3">
							<label class="form-label fw-medium">ステータス</label>
							<select class="form-select" th:field="*{status}" onchange="this.form.submit()">
								<option value="999">すべて</option>
								<option value="1">申告済み</option>
								<option value="2">未申告</option>
							</select>
						</div>
						<div class="col-md-6 text-end">
							<button type="submit" class="btn btn-primary px-4">
								<i class="bi bi-search me-1"></i>検索
							</button>
						</div>
					</div>
				</form>
			</div>
		</div>

		<!-- 基本情報エリア -->
		<div class="card mb-4 border-info">
			<div class="card-body py-2 bg-info-subtle">
				<div class="row text-center">
					<div class="col-md-4 border-end border-info">
						<small class="d-block text-muted">周期区分</small>
						<span class="fw-bold" th:text="${fukaDaichoForm.shukiKbnName}">-</span>
					</div>
					<div class="col-md-4 border-end border-info">
						<small class="d-block text-muted">期間</small>
						<span class="fw-bold">年度内各月</span>
					</div>
					<div class="col-md-4">
						<small class="d-block text-muted">納期</small>
						<span class="fw-bold">翌月末日</span>
					</div>
				</div>
			</div>
		</div>

		<!-- 明細テーブル -->
		<form th:action="@{/declaration/register/{id}(id=${fukaDaichoForm.shiteiNo})}" method="get">

		    <div class="card shadow-sm">
		        <div class="card-header bg-white py-3">
		            <h5 class="mb-0">
		                <i class="bi bi-building me-2"></i>
		                <span th:text="${fukaDaichoForm.obligorName}">特別徴収義務者名</span>
		            </h5>
		        </div>
		        <div class="card-body p-0">
		            <div class="table-responsive">
		                <table class="table table-hover table-bordered mb-0 align-middle">
		                    <thead class="table-primary text-center">
		                        <tr>
		                            <th style="width: 50px;">選択</th>
		                            <th>年月</th>
		                            <th>金額</th>
		                            <th>ステータス</th>
		                        </tr>
		                    </thead>
		                    <tbody>
		                        <tr th:each="item : ${fukaDaichoForm.items}" th:classappend="${item.shinkokuZumi} ? '' : 'table-light'">
									<td class="text-center">
									    <input type="radio" name="month" class="row-select"
									           th:value="${#temporals.format(item.targetYearMonth, 'yyyy-MM')}" 
									           th:data-status="${item.shinkokuZumi}"
									           th:data-nendo="${item.nendo}"
									           th:data-kibetsu="${item.kibetsu}"
									           required> 
									</td>
		                            <td class="text-center fw-bold" th:text="${item.displayNengetsu}">4月</td>
		                            <td class="text-end px-4">
		                                <span th:if="${item.totalZeigaku != null}" 
		                                      th:text="${#numbers.formatInteger(item.totalZeigaku, 1, 'COMMA') + ' 円'}">0 円</span>
		                                <span th:unless="${item.totalZeigaku != null}" class="text-muted">-</span>
		                            </td>
		                            <td class="text-center">
		                                <span th:if="${item.shinkokuZumi}" class="badge bg-success px-3 py-2">
		                                    <i class="bi bi-check-circle me-1"></i>済
		                                </span>
		                                <span th:unless="${item.shinkokuZumi}" class="badge bg-secondary px-3 py-2">
		                                    未
		                                </span>
		                            </td>
		                        </tr>
		                        <tr th:if="${#lists.isEmpty(fukaDaichoForm.items)}">
		                            <td colspan="4" class="text-center py-5 text-muted">
		                                表示できる情報がありません
		                            </td>
		                        </tr>
		                    </tbody>
		                </table>
		            </div>
		        </div>
		    </div>

		    <div class="d-flex justify-content-center gap-3 py-4">
		        <button type="submit" class="btn btn-primary btn-lg px-5">
		            <i class="bi bi-plus-circle me-1"></i>新規登録
		        </button>

		        <button type="button" id="btnViewDeclaration" class="btn btn-outline-primary btn-lg px-5">
		            <i class="bi bi-eye me-2"></i>照会
		        </button>
		        <a th:href="@{/tokugimu/list}" class="btn btn-outline-secondary btn-lg px-3">
		            <i class="bi bi-arrow-left me-1"></i>一覧に戻る
		        </a>
		    </div>

		</form>

		<th:block layout:fragment="scripts">
		    <script th:inline="javascript">
		        document.addEventListener('DOMContentLoaded', function() {
		            
		            // 💡 1. 新規登録ボタンの制御 (フォームのsubmitイベントをフックする)
		            const form = document.querySelector('form[action*="/declaration/register"]');
		            if (form) {
		                form.addEventListener('submit', function(e) {
		                    const selected = document.querySelector('input[name="month"]:checked');
		                    
		                    if (!selected) {
		                        alert("登録対象の年月を選択してください。");
		                        e.preventDefault(); // 処理をストップ
		                        return;
		                    }

		                    // 🔴 ガード：ステータスが「済 (true)」なら新規登録させない
		                    if (selected.getAttribute('data-status') === 'true') {
		                        alert("既に申告済みのデータです。「照会」ボタンを使用してください。");
		                        e.preventDefault(); // Submit (送信) をキャンセル
		                        return;
		                    }
		                    
		                    // 「未」の場合はそのままSubmitされ、FukaControllerに?month=yyyy-MMが飛ぶぜ
		                });
		            }

		            // 💡 2. 照会ボタンの制御
		            const btnView = document.getElementById('btnViewDeclaration');
		            if (btnView) {
		                btnView.addEventListener('click', function() {
		                    const selected = document.querySelector('input[name="month"]:checked');
		                    
		                    if (!selected) {
		                        alert("照会対象の年月を選択してください。");
		                        return;
		                    }

		                    // 🔴 ガード：ステータスが「未 (false)」なら照会させない
		                    if (selected.getAttribute('data-status') === 'false') {
		                        alert("未申告のデータです。「新規登録」ボタンを使用してください。");
		                        return;
		                    }

		                    // 「済」の場合：URLを組み立てて遷移する (Dynamic Routing)
		                    const nendo = selected.getAttribute('data-nendo');
		                    const kibetsu = selected.getAttribute('data-kibetsu');
		                    // Thymeleafから指定番号を取得
		                    const shiteiNo = /*[[${fukaDaichoForm.shiteiNo}]]*/ ''; 
		                    
		                    // 照会画面へ画面遷移
		                    window.location.href = `/accommodation-tax/declaration/view/${shiteiNo}/${nendo}/${kibetsu}`;
		                });
		            }
		        });
		    </script>
		</th:block>
</body>

</html>
